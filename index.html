<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFT Coaching Notes</title>
    <style>
        /* ベース設定 */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f5f6fa; color: #2d3436; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* サイドバー */
        .sidebar { width: 240px; background-color: #ffffff; padding: 20px; display: flex; flex-direction: column; gap: 10px; box-shadow: 2px 0 10px rgba(0,0,0,0.05); z-index: 10; }
        .sidebar h2 { margin-top: 0; font-size: 1.2rem; color: #0984e3; border-bottom: 2px solid #74b9ff; padding-bottom: 10px; }
        .stage-btn { background-color: #f1f2f6; color: #2d3436; border: 1px solid transparent; padding: 12px 15px; border-radius: 6px; text-align: left; cursor: pointer; font-size: 1rem; font-weight: 500; transition: 0.2s; }
        .stage-btn:hover { background-color: #dfe4ea; }
        .stage-btn.active { background-color: #0984e3; color: white; box-shadow: 0 4px 6px rgba(9, 132, 227, 0.2); }
        .summary-btn { margin-top: auto; background-color: #00b894; color: white; font-weight: bold; }
        .summary-btn.active { background-color: #009477; }

        /* メインコンテンツ */
        .main-content { flex: 1; padding: 30px 40px; overflow-y: auto; }
        .main-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #dfe4ea; padding-bottom: 15px; margin-bottom: 25px; }
        .main-header h1 { margin: 0; font-size: 2rem; color: #2d3436; }
        
        /* コンテナ（ラウンド枠） */
        .note-container { background-color: #ffffff; padding: 25px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #f1f2f6; border-left: 5px solid #0984e3; }
        .container-header { display: flex; align-items: center; margin-bottom: 20px; gap: 10px; }
        .container-header h3 { margin: 0; color: #2d3436; display: flex; align-items: center; gap: 8px; }
        .container-header input[type="text"] { font-size: 1.2rem; font-weight: bold; padding: 5px 10px; border: 1px solid #dfe4ea; border-radius: 6px; width: 200px; color: #0984e3; }
        .delete-round-btn { margin-left: auto; background-color: #ff7675; color: white; border: none; border-radius: 4px; padding: 5px 10px; cursor: pointer; font-size: 0.8rem; }
        .add-round-btn { background-color: #eccc68; color: #2f3542; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .add-round-btn:hover { background-color: #ffa502; }

        /* ブロックUI */
        .block-list { display: flex; flex-direction: column; gap: 15px; }
        .block-item { background: #fff; border: 1px solid #dfe4ea; border-radius: 8px; overflow: hidden; position: relative; transition: 0.2s; }
        .block-item:focus-within { border-color: #0984e3; box-shadow: 0 0 0 2px rgba(9, 132, 227, 0.1); }
        
        .block-toolbar { background: #f8f9fa; padding: 6px 10px; border-bottom: 1px solid #dfe4ea; display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: #636e72; }
        .block-toolbar strong { display: flex; align-items: center; gap: 5px; }
        .block-actions { margin-left: auto; display: flex; gap: 5px; }
        .action-btn { background: transparent; border: 1px solid #ced6e0; border-radius: 4px; cursor: pointer; padding: 2px 6px; color: #2d3436; font-size: 0.8rem; }
        .action-btn:hover { background: #dfe4ea; }
        .action-btn.delete { color: #d63031; border-color: #ff7675; }
        .action-btn.delete:hover { background: #ff7675; color: white; }

        /* ブロックタイプ別の中身 */
        .block-content { padding: 15px; }
        .block-content textarea { width: 100%; min-height: 80px; border: 1px solid #dfe4ea; border-radius: 6px; padding: 10px; font-size: 1rem; resize: vertical; box-sizing: border-box; background-color: #fcfcfc; }
        .block-content textarea:focus { outline: none; background-color: #fff; }
        .block-item.type-good .block-toolbar strong { color: #00b894; }
        .block-item.type-bad .block-toolbar strong { color: #d63031; }

        .image-upload-area { width: 100%; border: 2px dashed #ced6e0; border-radius: 8px; padding: 20px; text-align: center; color: #a4b0be; box-sizing: border-box; background: #fcfcfc; }
        .image-preview { width: 100%; display: flex; justify-content: center; }
        .image-preview img { max-width: 100%; max-height: 300px; border-radius: 6px; border: 1px solid #dfe4ea; }

        /* ホワイトボードUI */
        .wb-toolbar-wrapper { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
        .wb-colors { display: flex; gap: 6px; align-items: center; }
        .wb-color-btn { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: 0.1s; }
        .wb-color-btn:hover { transform: scale(1.1); }
        .wb-color-btn.active { border-color: #2d3436; box-shadow: 0 0 0 2px white inset, 0 0 5px rgba(0,0,0,0.2); }
        
        .wb-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .wb-action-btn { background: #f1f2f6; border: 1px solid #dfe4ea; border-radius: 4px; padding: 6px 12px; cursor: pointer; font-size: 0.85rem; font-weight: bold; color: #2d3436; display: flex; align-items: center; gap: 4px; }
        .wb-action-btn:hover { background: #dfe4ea; }
        .wb-action-btn.active { background: #eccc68; border-color: #eccc68; }
        .wb-action-btn.primary { background: #0984e3; color: white; border-color: #0984e3; }
        .wb-action-btn.primary:hover { background: #076aba; }
        .wb-action-btn.clear { margin-left: auto; color: #d63031; border-color: #fab1a0; background: #ffeaa7; }
        
        .wb-canvas-container { border: 1px solid #dfe4ea; border-radius: 6px; background: white; overflow: hidden; touch-action: none; position: relative; }
        canvas.whiteboard { width: 100%; aspect-ratio: 16 / 9; height: auto; cursor: crosshair; display: block; }

        /* 追加ボタン群 */
        .add-block-menu { display: flex; gap: 8px; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #dfe4ea; flex-wrap: wrap; }
        .add-btn { background: #f1f2f6; border: 1px solid #dfe4ea; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; color: #2d3436; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
        .add-btn:hover { background: #dfe4ea; }
        .add-btn.primary { background: #0984e3; color: white; border-color: #0984e3; }
        .add-btn.primary:hover { background: #076aba; }

        /* レポート出力 */
        .summary-view { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .summary-stage { margin-bottom: 40px; }
        .summary-title { color:#0984e3; border-bottom: 2px solid #dfe4ea; padding-bottom: 5px; margin-bottom: 20px; }
        .summary-container { margin-bottom: 30px; padding-left: 15px; border-left: 4px solid #0984e3; }
        
        .sum-block { margin-bottom: 15px; }
        .sum-text { font-size: 1rem; line-height: 1.6; white-space: pre-wrap; }
        .sum-text.good { color: #009477; padding: 10px; background: #e8f8f5; border-radius: 6px; }
        .sum-text.bad { color: #c0392b; padding: 10px; background: #fdedec; border-radius: 6px; }
        .sum-img { max-width: 100%; border-radius: 6px; border: 1px solid #dfe4ea; } 

        @media print {
            body { background: #fff; overflow: visible; height: auto; }
            .sidebar, .print-btn { display: none !important; }
            .main-content { padding: 0; overflow: visible; }
            .summary-view { box-shadow: none; padding: 0; }
            .summary-stage { page-break-inside: avoid; }
            .sum-block { page-break-inside: avoid; }
        }
        .print-btn { background: #2d3436; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>ステージ選択</h2>
        <div id="stage-list"></div>
        <button id="summary-btn" class="stage-btn summary-btn" onclick="showSummary()">📝 レポート出力</button>
    </div>

    <div class="main-content" id="main-content"></div>

    <script>
        // --- 状態管理 ---
        const stages = ['Stage 1', 'Stage 2', 'Stage 3', 'Stage 4', 'Stage 5', 'Stage 6', 'Stage 7'];
        let currentStage = 'Stage 2';
        let db = {};
        
        function initDB() { stages.forEach(s => { db[s] = []; }); }
        const genId = () => 'id_' + Date.now() + Math.random().toString(36).substr(2, 9);
        function createBlock(type) { return { id: genId(), type: type, content: null }; }
        function createRound(name) { return { id: genId(), name: name, blocks: [createBlock('text')] }; }

        function saveToLocal() { localStorage.setItem('tftCoachingData_v3', JSON.stringify(db)); }
        function loadFromLocal() {
            const saved = localStorage.getItem('tftCoachingData_v3');
            if (saved) {
                db = JSON.parse(saved);
            } else {
                initDB();
                db['Stage 2'].push(createRound('ステージ2 全体方針'));
                db['Stage 3'].push(createRound('3-2'));
            }
        }

        // --- データ操作 ---
        function addBlock(roundId, blockType) {
            const round = db[currentStage].find(r => r.id === roundId);
            if (round) round.blocks.push(createBlock(blockType));
            saveToLocal(); renderMainArea();
        }

        function deleteBlock(roundId, blockId) {
            const round = db[currentStage].find(r => r.id === roundId);
            if (round) round.blocks = round.blocks.filter(b => b.id !== blockId);
            saveToLocal(); renderMainArea();
        }

        function moveBlock(roundId, blockId, direction) {
            let arr = db[currentStage].find(r => r.id === roundId).blocks;
            const idx = arr.findIndex(b => b.id === blockId);
            if (idx < 0) return;
            if (direction === 'up' && idx > 0) [arr[idx-1], arr[idx]] = [arr[idx], arr[idx-1]];
            else if (direction === 'down' && idx < arr.length - 1) [arr[idx+1], arr[idx]] = [arr[idx], arr[idx+1]];
            saveToLocal(); renderMainArea();
        }

        function updateBlockContent(roundId, blockId, content) {
            let round = db[currentStage].find(r => r.id === roundId);
            if(round) {
                const block = round.blocks.find(b => b.id === blockId);
                if (block) { block.content = content; saveToLocal(); }
            }
        }

        function addRound() { db[currentStage].push(createRound('新規ラウンド / メモ')); saveToLocal(); renderMainArea(); }
        function deleteRound(roundId) { if(confirm('この枠を削除しますか？')) { db[currentStage] = db[currentStage].filter(r => r.id !== roundId); saveToLocal(); renderMainArea(); } }
        function updateRoundName(roundId, name) { const round = db[currentStage].find(r => r.id === roundId); if(round) { round.name = name; saveToLocal(); } }

        function handleImageUpload(e, roundId, blockId) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(evt) { updateBlockContent(roundId, blockId, evt.target.result); renderMainArea(); }
                reader.readAsDataURL(file);
            }
        }

        // --- ホワイトボード管理 ---
        let canvases = {};
        const wbColors = ['#2d3436', '#d63031', '#0984e3', '#00b894', '#fdcb6e', '#e17055', '#6c5ce7', '#fd79a8', '#00cec9', '#b2bec3'];

        function initWhiteboards() {
            const elements = document.querySelectorAll('.whiteboard');
            elements.forEach(canvas => {
                if (canvas.dataset.initialized) return;
                
                const blockId = canvas.dataset.blockId;
                const roundId = canvas.dataset.roundId;
                const ctx = canvas.getContext('2d');
                
                canvas.width = 1280; 
                canvas.height = 720; 
                ctx.lineCap = 'round'; 
                ctx.lineJoin = 'round';
                
                let arr = db[currentStage].find(r => r.id === roundId).blocks;
                const block = arr.find(b => b.id === blockId);

                canvases[blockId] = { 
                    canvas, ctx, isDrawing: false, 
                    color: '#d63031', isEraser: false, // 初期色を赤に変更（目立たせるため）
                    roundId, blockId,
                    undoStack: [], redoStack: []
                };

                if (block && block.content) {
                    let img = new Image();
                    img.onload = () => {
                        ctx.drawImage(img, 0, 0);
                        saveWbState(blockId); 
                    };
                    img.src = block.content;
                } else {
                    ctx.fillStyle = '#ffffff'; 
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    saveWbState(blockId); 
                }

                canvas.addEventListener('mousedown', (e) => startDraw(e, blockId));
                canvas.addEventListener('mousemove', (e) => draw(e, blockId));
                canvas.addEventListener('mouseup', () => stopDraw(blockId));
                canvas.addEventListener('mouseout', () => stopDraw(blockId));
                
                canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e.touches[0], blockId); }, {passive: false});
                canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e.touches[0], blockId); }, {passive: false});
                canvas.addEventListener('touchend', () => stopDraw(blockId));

                canvas.dataset.initialized = "true";
                updateWbUI(blockId);
            });
        }

        function saveWbState(id) {
            const cvs = canvases[id];
            if (cvs.undoStack.length >= 20) cvs.undoStack.shift();
            cvs.undoStack.push(cvs.canvas.toDataURL());
            cvs.redoStack = []; 
        }

        function loadStateToCanvas(id, dataUrl) {
            const cvs = canvases[id];
            let img = new Image();
            img.onload = () => {
                cvs.ctx.clearRect(0, 0, cvs.canvas.width, cvs.canvas.height);
                cvs.ctx.drawImage(img, 0, 0);
            };
            img.src = dataUrl;
            updateBlockContent(cvs.roundId, cvs.blockId, dataUrl);
        }

        window.wbUndo = function(id) {
            const cvs = canvases[id];
            if (cvs.undoStack.length > 1) {
                cvs.redoStack.push(cvs.undoStack.pop());
                const prevState = cvs.undoStack[cvs.undoStack.length - 1]; 
                loadStateToCanvas(id, prevState);
            }
        }

        window.wbRedo = function(id) {
            const cvs = canvases[id];
            if (cvs.redoStack.length > 0) {
                const nextState = cvs.redoStack.pop();
                cvs.undoStack.push(nextState);
                loadStateToCanvas(id, nextState);
            }
        }

        // --- ホワイトボードに画像を読み込む処理 ---
        window.handleWbBgUpload = function(e, roundId, blockId) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(evt) {
                const img = new Image();
                img.onload = function() {
                    const cvs = canvases[blockId];
                    // まず白で塗りつぶす
                    cvs.ctx.fillStyle = '#ffffff';
                    cvs.ctx.fillRect(0, 0, cvs.canvas.width, cvs.canvas.height);
                    
                    // アスペクト比を維持してキャンバスの中央に画像を最大化して描画
                    const hRatio = cvs.canvas.width / img.width;
                    const vRatio = cvs.canvas.height / img.height;
                    const ratio = Math.min(hRatio, vRatio);
                    const centerShift_x = (cvs.canvas.width - img.width * ratio) / 2;
                    const centerShift_y = (cvs.canvas.height - img.height * ratio) / 2;
                    
                    cvs.ctx.drawImage(img, 0, 0, img.width, img.height, centerShift_x, centerShift_y, img.width * ratio, img.height * ratio);
                    
                    saveWbState(blockId);
                    updateBlockContent(roundId, blockId, cvs.undoStack[cvs.undoStack.length - 1]);
                }
                img.src = evt.target.result;
            }
            reader.readAsDataURL(file);
            // 選択状態をリセット（同じ画像を連続で選べるようにする）
            e.target.value = '';
        }

        function getMousePos(canvas, evt) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (evt.clientX - rect.left) * (canvas.width / rect.width),
                y: (evt.clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function startDraw(e, id) { 
            canvases[id].isDrawing = true; 
            canvases[id].ctx.beginPath(); 
            draw(e, id); 
        }

        function draw(e, id) {
            const cvs = canvases[id];
            if(!cvs.isDrawing) return;
            const pos = getMousePos(cvs.canvas, e);
            
            cvs.ctx.strokeStyle = cvs.isEraser ? '#ffffff' : cvs.color;
            cvs.ctx.lineWidth = cvs.isEraser ? 40 : 5; 
            
            cvs.ctx.lineTo(pos.x, pos.y);
            cvs.ctx.stroke();
            cvs.ctx.beginPath();
            cvs.ctx.moveTo(pos.x, pos.y);
        }

        function stopDraw(id) {
            const cvs = canvases[id];
            if(!cvs.isDrawing) return;
            cvs.isDrawing = false;
            cvs.ctx.beginPath();
            saveWbState(id);
            updateBlockContent(cvs.roundId, cvs.blockId, cvs.undoStack[cvs.undoStack.length - 1]);
        }

        window.setWbColor = function(blockId, color) { 
            canvases[blockId].color = color; 
            canvases[blockId].isEraser = false;
            updateWbUI(blockId);
        }
        
        window.setWbEraser = function(blockId) {
            canvases[blockId].isEraser = true;
            updateWbUI(blockId);
        }

        window.clearWb = function(blockId) {
            if(confirm('白紙に戻しますか？（※読み込んだ画像も消えます）')) {
                const cvs = canvases[blockId];
                cvs.ctx.fillStyle = '#ffffff'; 
                cvs.ctx.fillRect(0, 0, cvs.canvas.width, cvs.canvas.height);
                saveWbState(blockId);
                updateBlockContent(cvs.roundId, blockId, cvs.undoStack[cvs.undoStack.length - 1]);
            }
        }

        function updateWbUI(blockId) {
            const cvs = canvases[blockId];
            if(!cvs) return;
            
            document.querySelectorAll(`.color-btn-${blockId}`).forEach(btn => {
                btn.classList.remove('active');
                if(!cvs.isEraser && btn.dataset.color === cvs.color) btn.classList.add('active');
            });
            
            const eraserBtn = document.getElementById(`eraser-${blockId}`);
            if(eraserBtn) {
                if(cvs.isEraser) eraserBtn.classList.add('active');
                else eraserBtn.classList.remove('active');
            }
        }

        // --- 描画ロジック ---
        function getBlockIconAndLabel(type) {
            if(type==='text') return '📝 テキスト';
            if(type==='good') return '🟢 Good (良かった点)';
            if(type==='bad') return '🔴 Bad (改善点)';
            if(type==='image') return '📷 画像のみ';
            if(type==='whiteboard') return '🖌️ スクショ＆手書き';
            return '';
        }

        function generateBlockHTML(block, roundId) {
            const pId = `'${roundId}', '${block.id}'`;
            let contentHTML = '';

            if (block.type === 'text' || block.type === 'good' || block.type === 'bad') {
                contentHTML = `<textarea placeholder="メモを入力..." onchange="updateBlockContent(${pId}, this.value)">${block.content || ''}</textarea>`;
            } else if (block.type === 'image') {
                contentHTML = block.content 
                    ? `<div class="image-preview"><img src="${block.content}" alt="Image"></div>
                       <div style="margin-top:10px; text-align:center;"><input type="file" accept="image/*" onchange="handleImageUpload(event, ${pId})"></div>`
                    : `<div class="image-upload-area">
                         <input type="file" accept="image/*" onchange="handleImageUpload(event, ${pId})">
                         <p>画像を選択してください</p>
                       </div>`;
            } else if (block.type === 'whiteboard') {
                let colorBtns = wbColors.map(color => 
                    `<button class="wb-color-btn color-btn-${block.id}" data-color="${color}" style="background:${color};" onclick="setWbColor('${block.id}', '${color}')"></button>`
                ).join('');

                contentHTML = `
                    <div class="wb-toolbar-wrapper">
                        <div class="wb-actions">
                            <label class="wb-action-btn primary" style="cursor:pointer;">
                                🖼️ 背景画像を読み込む
                                <input type="file" accept="image/*" style="display:none;" onchange="handleWbBgUpload(event, ${pId})">
                            </label>
                            <button id="eraser-${block.id}" class="wb-action-btn" onclick="setWbEraser('${block.id}')">🧹 消しゴム</button>
                            <button class="wb-action-btn" onclick="wbUndo('${block.id}')">↩️ 戻る</button>
                            <button class="wb-action-btn" onclick="wbRedo('${block.id}')">↪️ 進む</button>
                            <button class="wb-action-btn clear" onclick="clearWb('${block.id}')">🗑️ 白紙に戻す</button>
                        </div>
                        <div class="wb-colors">${colorBtns}</div>
                    </div>
                    <div class="wb-canvas-container">
                        <canvas class="whiteboard" data-block-id="${block.id}" data-round-id="${roundId}"></canvas>
                    </div>`;
            }

            return `
            <div class="block-item type-${block.type}">
                <div class="block-toolbar">
                    <strong>${getBlockIconAndLabel(block.type)}</strong>
                    <div class="block-actions">
                        <button class="action-btn" onclick="moveBlock(${pId}, 'up')" title="上に移動">↑</button>
                        <button class="action-btn" onclick="moveBlock(${pId}, 'down')" title="下に移動">↓</button>
                        <button class="action-btn delete" onclick="deleteBlock(${pId})" title="削除">×</button>
                    </div>
                </div>
                <div class="block-content">${contentHTML}</div>
            </div>`;
        }

        function generateAddMenuHTML(roundId) {
            return `
            <div class="add-block-menu">
                <button class="add-btn primary" onclick="addBlock('${roundId}', 'text')">＋ 📝 テキスト</button>
                <button class="add-btn" onclick="addBlock('${roundId}', 'good')">🟢 Good</button>
                <button class="add-btn" onclick="addBlock('${roundId}', 'bad')">🔴 Bad</button>
                <button class="add-btn" onclick="addBlock('${roundId}', 'whiteboard')">🖌️ スクショ＆手書き</button>
                <button class="add-btn" onclick="addBlock('${roundId}', 'image')">📷 画像のみ</button>
            </div>`;
        }

        const stageList = document.getElementById('stage-list');
        const mainContent = document.getElementById('main-content');
        const summaryBtn = document.getElementById('summary-btn');

        function renderSidebar() {
            stageList.innerHTML = '';
            stages.forEach(stage => {
                const btn = document.createElement('button');
                btn.className = `stage-btn ${stage === currentStage ? 'active' : ''}`;
                btn.innerText = stage;
                btn.onclick = () => { currentStage = stage; renderSidebar(); renderMainArea(); };
                stageList.appendChild(btn);
            });
            if(currentStage !== 'Summary') summaryBtn.classList.remove('active');
        }

        function renderMainArea() {
            let html = `<div class="main-header"><h1>${currentStage}</h1><button class="add-round-btn" onclick="addRound()">＋ 枠を追加 (ラウンド/メモ)</button></div>`;
            
            if (db[currentStage].length === 0) {
                html += `<p style="color: #636e72;">データがありません。「＋ 枠を追加」ボタンを押して記録を始めましょう。</p>`;
            }

            db[currentStage].forEach(round => {
                html += `
                <div class="note-container">
                    <div class="container-header">
                        <h3>見出し:</h3>
                        <input type="text" value="${round.name}" onchange="updateRoundName('${round.id}', this.value)" placeholder="例：3-2, ステージ方針">
                        <button class="delete-round-btn" onclick="deleteRound('${round.id}')">削除</button>
                    </div>
                    <div class="block-list">`;
                round.blocks.forEach(b => html += generateBlockHTML(b, round.id));
                html += `   </div>
                    ${generateAddMenuHTML(round.id)}
                </div>`;
            });

            mainContent.innerHTML = html;
            setTimeout(initWhiteboards, 0);
        }

        // --- レポート出力 ---
        function isBlockEmpty(block) {
            if(!block.content) return true;
            if(block.type === 'text' || block.type === 'good' || block.type === 'bad') return block.content.trim() === '';
            return false;
        }

        function generateSummaryBlockHTML(block) {
            if (isBlockEmpty(block)) return '';
            if (block.type === 'text') return `<div class="sum-block sum-text">${block.content}</div>`;
            if (block.type === 'good') return `<div class="sum-block sum-text good"><strong>🟢 Good:</strong><br>${block.content}</div>`;
            if (block.type === 'bad') return `<div class="sum-block sum-text bad"><strong>🔴 Bad / Next:</strong><br>${block.content}</div>`;
            if (block.type === 'image' || block.type === 'whiteboard') return `<div class="sum-block"><img src="${block.content}" class="sum-img"></div>`;
            return '';
        }

        function showSummary() {
            currentStage = 'Summary';
            document.querySelectorAll('.stage-btn').forEach(btn => btn.classList.remove('active'));
            summaryBtn.classList.add('active');

            let html = `<div class="main-header"><h1>📝 全体レポート</h1></div>`;
            html += `<button class="print-btn" onclick="window.print()">📄 PDFとして保存 / 印刷</button>`;
            html += `<div class="summary-view">`;

            let hasData = false;

            stages.forEach(stageName => {
                let stageHTML = `<div class="summary-stage"><h2 class="summary-title">${stageName}</h2>`;
                let hasStageContent = false;

                db[stageName].forEach(round => {
                    const validBlocks = round.blocks.filter(b => !isBlockEmpty(b));
                    if (validBlocks.length > 0) {
                        hasStageContent = true;
                        stageHTML += `<div class="summary-container round-note"><h3>■ ${round.name}</h3>`;
                        validBlocks.forEach(b => stageHTML += generateSummaryBlockHTML(b));
                        stageHTML += `</div>`;
                    }
                });

                stageHTML += `</div>`;
                if (hasStageContent) {
                    hasData = true;
                    html += stageHTML;
                }
            });

            if(!hasData) html += `<p>まだ記録されたフィードバックがありません。</p>`;
            html += `</div>`;
            mainContent.innerHTML = html;
        }

        // 起動処理
        loadFromLocal();
        renderSidebar();
        renderMainArea();
    </script>
</body>
</html>
