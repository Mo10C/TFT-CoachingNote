            } else if (block.type === 'flowchart') {
                const flowData = JSON.parse(block.content || '{"nodes":[],"edges":[]}');
                let maxBottom = 400;
                let nodesHtml = '';
                flowData.nodes.forEach(node => {
                    let nodeInnerHtml = '';
                    let nodeClasses = 'flowchart-node';
                    if (node.type === 'icon') {
                        nodeInnerHtml = `<img src="${node.content}" alt="icon">`;
                        nodeClasses += ' flowchart-node-icon';
                    } else {
                        nodeInnerHtml = `<div class="node-content" contenteditable="true" onblur="updateFlowchartNodeContent('${roundId}', '${blockId}', '${node.id}', this.innerText)">${node.content}</div>`;
                        nodeClasses += ' flowchart-node-text';
                    }
                    
                    let actionBtns = '';
                    actionBtns += `<button class="fc-btn" onclick="startConnectNode('${roundId}', '${blockId}', '${node.id}')" title="線を繋ぐ">🔗</button>`;
                    actionBtns += `<button class="fc-btn del" onclick="deleteFlowchartNode('${roundId}', '${blockId}', '${node.id}')" title="削除">×</button>`;

                    nodesHtml += `<div id="${node.id}" class="${nodeClasses}" style="left:${node.x || 0}px; top:${node.y || 0}px; width:${node.width ? node.width+'px' : 'auto'}; height:${node.height ? node.height+'px' : 'auto'}; z-index:1;" onmousedown="startNodeDrag(event, '${roundId}', '${blockId}', '${node.id}')">
                        ${nodeInnerHtml}
                        <div class="node-action-bar">${actionBtns}</div>
                        <div class="resize-handle" onmousedown="startNodeResize(event, '${roundId}', '${blockId}', '${node.id}')"></div>
                    </div>`;
                });
                contentHTML = `
                    <div class="flowchart-toolbar">
                        <button class="add-block-btn" onclick="addFlowchartTextNode('${roundId}', '${blockId}')">＋ テキスト追加</button>
                        <span style="font-size:11px; margin-left:10px; color:var(--ink-light); display:flex; align-items:center;">※ 🔗ボタンを押してから別の要素をクリックで線を引きます。線をクリックで削除。</span>
                    </div>
                    <div class="flowchart-container" id="fc-${blockId}" data-round-id="${roundId}" data-block-id="${blockId}" ondragover="event.preventDefault()" ondrop="handleFlowchartDrop(event, '${roundId}', '${blockId}')" style="min-height: ${maxBottom}px;">
                        <svg class="flowchart-edges" id="svg-${blockId}" style="position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:0;"></svg>
                        ${nodesHtml}
                    </div>
                `;
            }

            const isTextBlock = (block.type === 'text' || block.type === 'good' || block.type === 'bad');
            const formatControls = isTextBlock ? `
                <div class="format-controls">
                    <label class="fmt-label">サイズ</label>
                    <input class="fmt-size" type="number" min="8" max="48" value="${fmt.fontSize || 13}" title="フォントサイズ(px)"
                        onchange="updateBlockFormat('${roundId}', '${blockId}', 'fontSize', parseInt(this.value))">
                    <label class="fmt-label">太さ</label>
                    <select class="fmt-select" title="フォントウェイト" onchange="updateBlockFormat('${roundId}', '${blockId}', 'fontWeight', this.value)">
                        <option value="normal" ${fmt.fontWeight === 'normal' ? 'selected' : ''}>標準</option>
                        <option value="bold" ${fmt.fontWeight === 'bold' ? 'selected' : ''}>太字</option>
                    </select>
                    <label class="fmt-label">色</label>
                    <input class="fmt-color" type="color" value="${fmt.color || '#1C2333'}" title="フォントカラー"
                        onchange="updateBlockFormat('${roundId}', '${blockId}', 'color', this.value)">
                    <button class="fmt-reset" onclick="resetBlockFormat('${roundId}', '${blockId}')" title="書式リセット">↺</button>
                </div>` : '';

            const displayLabel = block.label !== null && block.label !== undefined ? block.label : getBlockLabel(block.type);

            return `
            <div class="block-item type-${block.type}">
                <div class="block-toolbar">
                    <input class="block-label-input" type="text" value="${displayLabel}" placeholder="${getBlockLabel(block.type)}" onchange="updateBlockLabel('${roundId}', '${blockId}', this.value)" title="クリックして名前を編集">
                    ${formatControls}
                    <div class="block-actions">
                        <button class="action-btn" onclick="moveBlock('${roundId}', '${blockId}', 'up')" title="上へ">↑</button>
                        <button class="action-btn" onclick="moveBlock('${roundId}', '${blockId}', 'down')" title="下へ">↓</button>
                        <button class="action-btn delete" onclick="deleteBlock('${roundId}', '${blockId}')">×</button>
                    </div>
                </div>
                <div class="block-content">${contentHTML}</div>
            </div>`;
        }

        const mainContent = document.getElementById('main-content');
        const headerActions = document.getElementById('header-actions');

        function renderSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const stageList = document.getElementById('stage-list');

            if (currentStage === 'Home') {
                sidebar.classList.add('hidden');
                headerActions.classList.add('hidden');
            } else {
                sidebar.classList.remove('hidden');
                headerActions.classList.remove('hidden');
            }

            stageList.innerHTML = '';
            const homeBtn = document.getElementById('home-btn');
            homeBtn.classList.toggle('active', currentStage === 'Home');

            const currentStages = appData.currentId && appData.sessions[appData.currentId] ? appData.sessions[appData.currentId].stages : defaultStages;

            currentStages.forEach(stage => {
                const div = document.createElement('div');
                div.className = 'stage-item';
                
                const btn = document.createElement('button');
                btn.className = `stage-btn ${stage === currentStage ? 'active' : ''}`;
                btn.innerText = stage;
                btn.onclick = () => {
                    if (appData.currentId) { currentStage = stage; renderSidebar(); renderMainArea(); }
                    else { alert('まずはホーム画面からノートを選択するか、新しく作成してください。'); }
                };
                
                const actions = document.createElement('div');
                actions.className = 'stage-actions';
                actions.innerHTML = `
                    <button class="stage-action-btn" title="名前を変更" onclick="event.stopPropagation(); editCategory('${stage}')">✎</button>
                    <button class="stage-action-btn" title="削除" onclick="event.stopPropagation(); deleteCategory('${stage}')">🗑</button>
                `;

                div.appendChild(btn);
                if (appData.currentId) div.appendChild(actions);
                stageList.appendChild(div);
            });

            if (appData.currentId) {
                const addBtn = document.createElement('button');
                addBtn.className = 'add-stage-btn';
                addBtn.innerText = '＋ カテゴリー追加';
                addBtn.onclick = addCategory;
                stageList.appendChild(addBtn);
            }

            const summaryBtn = document.getElementById('summary-btn');
            summaryBtn.classList.toggle('active', currentStage === 'Summary');
        }

        function showHome() {
            currentStage = 'Home';
            renderSidebar();

            const sortedSessions = Object.values(appData.sessions).sort((a, b) => new Date(b.date) - new Date(a.date));

            let html = `<div class="home-view">
                <div class="home-header">
                    <h1 class="home-title">コーチング<span>ノート</span>履歴</h1>
                    <button class="new-session-btn" onclick="createNewSession()">＋ 新規作成</button>
                </div>
                <div class="session-grid">`;

            if (sortedSessions.length === 0) {
                html += `<div class="empty-state"><div class="emoji">📋</div><p>保存されたノートがありません。<br>「＋ 新規作成」から始めましょう。</p></div>`;
            } else {
                sortedSessions.forEach(session => {
                    html += `<div class="session-card" onclick="loadSession('${session.id}')">
                        <h3>${session.title}</h3>
                        <div class="date">作成日: ${formatDate(session.date)}</div>
                        <div class="session-card-actions">
                            <button class="delete-session-btn" onclick="deleteSession(event, '${session.id}')">削除</button>
                        </div>
                    </div>`;
                });
            }

            html += `</div></div>`;
            mainContent.innerHTML = html;
        }

        function renderMainArea() {
            if (currentStage === 'Home' || currentStage === 'Summary') return;
            if (!appData.currentId) { showHome(); return; }

            const session = appData.sessions[appData.currentId];

            let html = `<div class="main-header">
                <input type="text" class="session-title-input" value="${session.title}" onchange="updateSessionTitle(this.value)" placeholder="ノートのタイトルを入力">
                <div class="stage-badge">${currentStage}</div>
            </div>`;

            if (db[currentStage].length === 0) {
                html += `<div class="empty-state"><div class="emoji">✏️</div><p>データがありません。<br>上の「＋ 枠を追加」ボタンを押して記録を始めましょう。</p></div>`;
            }

            db[currentStage].forEach(round => {
                html += `<div class="note-container">
                    <div class="container-header">
                        <span class="container-header-label">見出し</span>
                        <input type="text" value="${round.name}" onchange="updateRoundName('${round.id}', this.value)" placeholder="例：3-2, ステージ方針">
                        <button class="delete-round-btn" onclick="deleteRound('${round.id}')">削除</button>
                    </div>
                    <div class="block-list">`;
                round.blocks.forEach(b => html += generateBlockHTML(b, round.id));
                html += `</div>
                    <div class="add-block-bar">
                        <button class="add-block-btn" onclick="addBlock('${round.id}', 'text')">＋ メモ</button>
                        <button class="add-block-btn" onclick="addBlock('${round.id}', 'good')">＋ Good</button>
                        <button class="add-block-btn" onclick="addBlock('${round.id}', 'bad')">＋ Bad</button>
                        <button class="add-block-btn" onclick="addBlock('${round.id}', 'image')">＋ 画像</button>
                        <button class="add-block-btn" onclick="addBlock('${round.id}', 'whiteboard')">＋ ホワイトボード</button>
                        <button class="add-block-btn" onclick="addBlock('${round.id}', 'tier')">＋ Tierリスト</button>
                        <button class="add-block-btn" onclick="addBlock('${round.id}', 'board')">＋ 盤面</button>
                        <button class="add-block-btn" onclick="addBlock('${round.id}', 'flowchart')">＋ フローチャート</button>
                    </div>
                </div>`;
            });

            mainContent.innerHTML = html;
            setTimeout(() => {
                initWhiteboards();
                drawAllFlowchartEdges();
            }, 0);
        }

        window.drawAllFlowchartEdges = function() {
            document.querySelectorAll('.flowchart-container').forEach(container => {
                const roundId = container.dataset.roundId;
                const blockId = container.dataset.blockId;
                if (!roundId || !blockId) return;
                const round = db[currentStage]?.find(r => r.id === roundId);
                const block = round?.blocks.find(b => b.id === blockId);
                if (!block) return;
                const flowData = JSON.parse(block.content || '{"nodes":[],"edges":[]}');
                const svg = document.getElementById(`svg-${blockId}`);
                if (!svg || !flowData.edges) return;
                let svgHtml = '';
                const cRect = container.getBoundingClientRect();
                flowData.edges.forEach((edge, idx) => {
                    const el1 = document.getElementById(edge.from);
                    const el2 = document.getElementById(edge.to);
                    if (el1 && el2) {
                        const r1 = el1.getBoundingClientRect(); const r2 = el2.getBoundingClientRect();
                        const x1 = r1.left - cRect.left + r1.width / 2; const y1 = r1.top - cRect.top + r1.height / 2;
                        const x2 = r2.left - cRect.left + r2.width / 2; const y2 = r2.top - cRect.top + r2.height / 2;
                        svgHtml += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="var(--ink-light)" stroke-width="2" pointer-events="auto" cursor="pointer" onclick="deleteFlowchartEdge('${roundId}', '${blockId}', ${idx})" title="クリックで削除" />`;
                    }
                });
                svg.innerHTML = svgHtml;
            });
        };

        function showSummary() {
            if (!appData.currentId) { alert('出力するノートを選択してください。'); return; }
            currentStage = 'Summary';
            renderSidebar();

            const session = appData.sessions[appData.currentId];

            let html = `<div class="main-header">
                <div>
                    <h1 style="font-family:'Rajdhani',sans-serif;font-weight:700;font-size:22px;letter-spacing:0.5px;color:var(--ink);">レポート出力</h1>
                    <p style="margin-top:4px;color:var(--ink-light);font-size:13px;">${session.title}</p>
                </div>
            </div>
            <button class="print-btn" onclick="window.print()">📄 PDFとして保存 / 印刷</button>
            <div class="summary-view">`;

            let hasData = false;
            session.stages.forEach(stageName => {
                let stageHTML = `<div class="summary-stage"><h2 class="summary-title">${stageName}</h2>`;
                let hasStage = false;
                const stageData = db[stageName] || [];
                stageData.forEach(round => {
                    const valid = round.blocks.filter(b => b.content && b.content.trim() !== '' && b.content !== '<br>');
                    if (valid.length > 0) {
                        hasStage = true;
                        stageHTML += `<div class="summary-container">`;
                        if (round.name.trim()) stageHTML += `<h3 style="margin:0 0 12px;color:var(--ink);font-size:15px;font-weight:700;">${round.name}</h3>`;
                        valid.forEach(b => {
                            const fmt = b.format || {};
                            const fmtStyle = `font-size:${fmt.fontSize||13}px;font-weight:${fmt.fontWeight||'normal'};${fmt.color?'color:'+fmt.color+';':''}`;
                            const defaultLabel = getBlockLabel(b.type);
                            const displayLabel = (b.label !== null && b.label !== undefined && b.label !== '') ? b.label : defaultLabel;
                            const labelHtml = `<div style="font-size:12px;font-weight:700;color:var(--ink-mid);margin-bottom:8px;padding-bottom:4px;border-bottom:2px solid var(--border-strong);display:inline-block;padding-right:24px;">${displayLabel}</div>`;

                            if (b.type === 'text') {
                                stageHTML += `<div class="sum-block">${labelHtml}<div class="sum-text" style="${fmtStyle}">${b.content}</div></div>`;
                            }
                            if (b.type === 'good') {
                                stageHTML += `<div class="sum-block">${labelHtml}<div class="sum-text good" style="${fmtStyle}">${b.content}</div></div>`;
                            }
                            if (b.type === 'bad') {
                                stageHTML += `<div class="sum-block">${labelHtml}<div class="sum-text bad" style="${fmtStyle}">${b.content}</div></div>`;
                            }
                            
                            if (b.type === 'image' || b.type === 'whiteboard') {
                                stageHTML += `<div class="sum-block">${labelHtml}<br><img src="${b.content}" class="sum-img" style="margin-top:4px;"></div>`;
                            }

                            if (b.type === 'tier') {
                                const tierData = JSON.parse(b.content || '[]');
                                let tHtml = `<div class="sum-block">${labelHtml}<div style="border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; display: flex; flex-direction: column; gap: 1px; background: var(--surface-2);">`;
                                tierData.forEach(t => {
                                    tHtml += `<div style="display: flex; background: var(--surface); min-height: 44px;"><div style="width: 60px; background: ${t.color}; display: flex; align-items: center; justify-content: center; font-weight: bold; border-right: 1px solid var(--border);">${t.label}</div><div style="flex: 1; padding: 6px; display: flex; flex-wrap: wrap; gap: 6px;">${t.items.map(item => {
                                        const url = typeof item === 'string' ? item : item.url;
                                        const name = typeof item === 'string' ? findNameByUrl(url) : item.name;
                                        return `<div style="display:flex; flex-direction:column; align-items:center; width: 40px;"><img src="${url}" style="width: 32px; height: 32px; border-radius: 4px; object-fit: cover;"><div style="font-size:5px; color: var(--ink-light); text-align:center; line-height:1.1; margin-top:2px; width:100%; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${name}</div></div>`;
                                    }).join('')}</div></div>`;
                                });
                                tHtml += `</div></div>`;
                                stageHTML += tHtml;
                            }
                            if (b.type === 'flowchart') {
                                const flowData = JSON.parse(b.content || '{"nodes":[],"edges":[]}');
                                let maxBottom = 300;
                                flowData.nodes.forEach(n => {
                                    const h = n.height || (n.type === 'icon' ? 64 : 40);
                                    const btm = (n.y || 0) + h;
                                    if (btm + 60 > maxBottom) maxBottom = btm + 60;
                                });
                                let fHtml = `<div class="sum-block">${labelHtml}<div class="flowchart-container" data-round-id="${round.id}" data-block-id="${b.id}" style="position:relative; min-height:${maxBottom}px; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-sm); overflow:hidden;">`;
                                fHtml += `<svg class="flowchart-edges" id="svg-${b.id}" style="position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:0;"></svg>`;
                                flowData.nodes.forEach(node => {
                                    let nodeInnerHtml = '';
                                    if (node.type === 'icon') {
                                        nodeInnerHtml = `<img src="${node.content}" style="width:100%; height:100%; object-fit:cover;">`;
                                    } else {
                                        nodeInnerHtml = `<div style="padding:8px; font-size:11px; width:100%; height:100%; overflow:hidden;">${node.content}</div>`;
                                    }
                                    fHtml += `<div id="${node.id}" style="position:absolute; left:${node.x || 0}px; top:${node.y || 0}px; width:${node.width ? node.width+'px' : 'auto'}; height:${node.height ? node.height+'px' : 'auto'}; background:var(--surface); border:1px solid var(--border-strong); border-radius:var(--radius-sm); box-shadow:var(--shadow-sm); z-index:1; display:flex; align-items:center; justify-content:center;">${nodeInnerHtml}</div>`;
                                });
                                fHtml += `</div></div>`;
                                stageHTML += fHtml;
                            }
                            if (b.type === 'board') {
                                const boardData = JSON.parse(b.content || '[]');
                                
                                let traitCounts = {};
                                let seenIds = new Set();
                                boardData.forEach(cell => {
                                    if (cell && cell.champ) {
                                        const champData = assetData.champ.find(c => c.url === cell.champ);
                                        if (champData && !seenIds.has(champData.name)) {
                                            seenIds.add(champData.name);
                                            let unitTraits = new Set(champData.traits || []);
                                            (cell.items || []).forEach(itUrl => {
                                                const itemData = assetData.item.find(i => i.url === itUrl);
                                                if (itemData && itemData.grantedTrait) unitTraits.add(itemData.grantedTrait);
                                            });
                                            unitTraits.forEach(t => { traitCounts[t] = (traitCounts[t] || 0) + 1; });
                                        }
                                    }
                                });

                                let activeTraits = [];
                                for (let t in traitCounts) {
                                    const count = traitCounts[t];
                                    const tiers = TRAIT_TIERS[t] || [2];
                                    if (count >= tiers[0]) activeTraits.push({ name: TRAIT_JA[t] || t, count });
                                }
                                activeTraits.sort((a, b) => b.count - a.count);

                                let traitsHtml = `<div style="width: 100px; flex-shrink: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px; display: flex; flex-direction: column; gap: 4px;">`;
                                traitsHtml += `<div style="font-size: 6px; color: var(--gold-dim); font-weight: bold; text-align: center; margin-bottom: 4px; letter-spacing: 1px;">ACTIVE TRAITS</div>`;
                                if (activeTraits.length === 0) traitsHtml += `<div style="font-size: 5px; color: var(--ink-xlight); text-align: center;">なし</div>`;
                                else activeTraits.forEach(at => { traitsHtml += `<div style="display: flex; align-items: center; justify-content: space-between; background: var(--surface-2); border: 1px solid var(--border); padding: 2px 4px; border-radius: 3px;"><span style="font-size: 5px; color: var(--ink); font-weight: 600;">${at.name}</span><span style="font-size: 5px; color: var(--navy); font-weight: 700; background: var(--gold-pale); border: 1px solid var(--gold-light); padding: 0 4px; border-radius: 3px;">${at.count}</span></div>`; });
                                traitsHtml += `</div>`;

                                let bHtml = `<div class="sum-block">${labelHtml}<div style="background: var(--surface-2); border: 1px solid var(--border); padding: 16px; border-radius: var(--radius-sm); display: flex; justify-content: space-between; align-items: flex-start;">${traitsHtml}<div style="display: flex; flex-direction: column; gap: 2px; margin: 0 auto;">`;
                                for(let row = 0; row < 4; row++) {
                                    bHtml += `<div style="display: flex; gap: 2px; ${row % 2 === 1 ? 'margin-left: 20px;' : ''}">`;
                                    for(let col = 0; col < 7; col++) {
                                        const cell = boardData[row * 7 + col];
                                        let hexStroke = 'var(--border-strong)';
                                        let hexStrokeWidth = '1';
                                        if (cell && cell.champ) {
                                            const champData = assetData.champ.find(c => c.url === cell.champ);
                                            if (champData) {
                                                const costColors = { 1: '#8a9aaa', 2: '#44cc66', 3: '#3399ff', 4: '#cc44ff', 5: '#ffcc44' };
                                                hexStroke = costColors[champData.cost] || hexStroke;
                                                hexStrokeWidth = '2';
                                            }
                                        }
                                        bHtml += `<div style="width: 40px; height: 40px; position: relative;"><svg viewBox="0 0 78 78" style="width:100%;height:100%;"><polygon points="39,2 76,20 76,58 39,76 2,58 2,20" fill="var(--surface)" stroke="${hexStroke}" stroke-width="${hexStrokeWidth}"></polygon></svg>`;
                                        if (cell) {
                                            bHtml += `<div style="position:absolute; inset:2px; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); background: #000; display:flex; align-items:center; justify-content:center;"><img src="${cell.champ}" style="width:100%;height:100%;object-fit:cover;"></div>`;
                                            if (cell.items && cell.items.length > 0) {
                                                bHtml += `<div style="position: absolute; top: 2px; left: 50%; transform: translateX(-50%); display: flex; gap: 1px; z-index: 2;">`;
                                                cell.items.forEach(itUrl => {
                                                    bHtml += `<img src="${itUrl}" style="width: 12px; height: 12px; border: 1px solid rgba(255,255,255,0.8); border-radius: 1px;">`;
                                                });
                                                bHtml += `</div>`;
                                            }
                                        }
                                        bHtml += `</div>`;
                                    }
                                    bHtml += `</div>`;
                                }
                                bHtml += `</div><div style="width: 100px; flex-shrink: 0;"></div></div></div>`;
                                stageHTML += bHtml;
                            }
                        });
                        stageHTML += `</div>`;
                    }
                });
                stageHTML += `</div>`;
                if (hasStage) { hasData = true; html += stageHTML; }
            });

            if (!hasData) html += `<p style="color:var(--ink-xlight);">まだ記録されたフィードバックがありません。</p>`;
            html += `</div>`;
            mainContent.innerHTML = html;
            setTimeout(drawAllFlowchartEdges, 0);
        }

        loadFromLocal();
        renderDrawerAssets();
        showHome();
    </script>
</body>
</html>
