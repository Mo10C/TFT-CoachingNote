<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFT Coaching Notes</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C89B3C;
            --gold-light: #F0D58C;
            --gold-pale: #FDF7E8;
            --gold-dim: #8C6A24;
            --navy: #0A1628;
            --navy-mid: #1A2A42;
            --navy-light: #243652;
            --ink: #1C2333;
            --ink-mid: #3A4460;
            --ink-light: #6B7BA0;
            --ink-xlight: #A8B3CC;
            --surface: #FFFFFF;
            --surface-2: #F4F6FA;
            --surface-3: #EBEEf5;
            --border: #DDE2EE;
            --border-strong: #C8D0E0;
            --green: #1A8A5A;
            --green-bg: #EAF7F0;
            --red: #C0392B;
            --red-bg: #FDECEA;
            --blue: #1260D4;
            --blue-bg: #EBF1FD;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 3px rgba(10,22,40,0.08), 0 1px 2px rgba(10,22,40,0.04);
            --shadow-md: 0 4px 12px rgba(10,22,40,0.10), 0 2px 4px rgba(10,22,40,0.05);
            --shadow-lg: 0 8px 24px rgba(10,22,40,0.12), 0 4px 8px rgba(10,22,40,0.06);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--surface-2);
            color: var(--ink);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            font-size: 14px;
            line-height: 1.6;
        }

        /* ── HEADER ── */
        .app-header {
            background: var(--navy);
            color: white;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 52px;
            flex-shrink: 0;
            position: relative;
        }

        .app-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-logo-mark {
            width: 28px;
            height: 28px;
            background: var(--gold);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 13px;
            color: var(--navy);
            letter-spacing: -0.5px;
        }

        .header-logo-text {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 17px;
            color: var(--gold-light);
            letter-spacing: 1px;
        }

        .header-links {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .link-btn {
            color: var(--ink-xlight);
            text-decoration: none;
            padding: 5px 10px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255,255,255,0.12);
            font-size: 12px;
            font-weight: 500;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.05);
        }

        .link-btn:hover {
            background: rgba(200,155,60,0.15);
            border-color: rgba(200,155,60,0.4);
            color: var(--gold-light);
        }

        .link-btn img {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            object-fit: contain;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-actions.hidden { display: none; }

        .header-btn {
            border: none;
            padding: 7px 14px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-family: 'Noto Sans JP', sans-serif;
            white-space: nowrap;
        }

        .header-btn:hover { transform: translateY(-1px); }

        .btn-primary {
            background: var(--gold);
            color: var(--navy);
        }

        .btn-primary:hover { background: var(--gold-light); }

        .btn-ghost {
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.8);
            border: 1px solid rgba(255,255,255,0.15);
        }

        .btn-ghost:hover {
            background: rgba(255,255,255,0.14);
            color: white;
        }

        /* ── LAYOUT ── */
        .app-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 110px;
            background: var(--surface);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            flex-shrink: 0;
            overflow: hidden;
        }

        .sidebar.hidden { display: none; }

        .sidebar-section-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--ink-xlight);
            text-transform: uppercase;
            padding: 16px 10px 6px;
        }

        .stage-btn {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 9px 10px;
            background: none;
            border: none;
            text-align: left;
            cursor: pointer;
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 11px;
            font-weight: 500;
            color: var(--ink-mid);
            transition: all 0.12s;
            border-radius: 0;
            position: relative;
        }

        .stage-btn:hover {
            background: var(--surface-2);
            color: var(--ink);
        }

        .stage-btn.active {
            background: var(--gold-pale);
            color: var(--gold-dim);
            font-weight: 700;
        }

        .stage-btn.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--gold);
            border-radius: 0 2px 2px 0;
        }

        .home-btn {
            background: var(--surface-2);
            border-bottom: 1px solid var(--border);
            color: var(--ink-mid);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .home-btn.active {
            background: var(--navy);
            color: var(--gold-light);
        }

        .home-btn.active::before {
            background: var(--gold);
        }

        .stage-item { position: relative; display: flex; align-items: center; }
        .stage-actions { position: absolute; right: 5px; display: none; gap: 4px; }
        .stage-item:hover .stage-actions { display: flex; }
        .stage-action-btn { background: transparent; border: none; cursor: pointer; font-size: 11px; color: var(--ink-xlight); padding: 2px; border-radius: 3px; }
        .stage-action-btn:hover { color: var(--ink); background: var(--surface-3); }
        .add-stage-btn {
            width: calc(100% - 20px); margin: 8px 10px; padding: 6px;
            background: transparent; border: 1px dashed var(--border-strong);
            color: var(--ink-light); cursor: pointer; font-size: 11px;
            border-radius: var(--radius-sm); transition: 0.15s;
        }
        .add-stage-btn:hover {
            background: var(--surface-2); color: var(--ink); border-color: var(--gold);
        }

        .sidebar-footer {
            margin-top: auto;
            border-top: 1px solid var(--border);
        }

        .summary-btn {
            color: var(--green);
            font-weight: 700;
            background: var(--green-bg);
        }

        .summary-btn.active {
            background: var(--green);
            color: white;
        }

        /* ── MAIN CONTENT ── */
        .main-content {
            flex: 1;
            padding: 24px 28px;
            overflow-y: auto;
            background: var(--surface-2);
        }

        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .session-title-input {
            font-size: 1.5rem;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            color: var(--ink);
            border: 1.5px solid transparent;
            background: transparent;
            padding: 6px 10px;
            border-radius: var(--radius-sm);
            width: 60%;
            transition: all 0.15s;
            letter-spacing: 0.3px;
        }

        .session-title-input:hover { border-color: var(--border-strong); background: var(--surface); }
        .session-title-input:focus { border-color: var(--gold); background: var(--surface); outline: none; box-shadow: 0 0 0 3px rgba(200,155,60,0.12); }

        .stage-badge {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 15px;
            color: var(--navy-light);
            background: var(--surface-3);
            padding: 6px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            letter-spacing: 1px;
        }

        /* ── HOME VIEW ── */

        .home-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .home-title {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 22px;
            color: var(--ink);
            letter-spacing: 0.5px;
        }

        .home-title span {
            color: var(--gold-dim);
        }

        .new-session-btn {
            background: var(--gold);
            color: var(--navy);
            border: none;
            padding: 9px 18px;
            border-radius: var(--radius-sm);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 0.5px;
        }

        .new-session-btn:hover {
            background: var(--gold-light);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .session-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .session-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 20px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
        }

        .session-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 100%);
            opacity: 0;
            transition: opacity 0.15s;
        }

        .session-card:hover {
            border-color: var(--gold);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .session-card:hover::before { opacity: 1; }

        .session-card h3 {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 16px;
            color: var(--ink);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.3px;
        }

        .session-card .date {
            font-size: 12px;
            color: var(--ink-xlight);
        }

        .session-card-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 4px;
        }

        .delete-session-btn {
            background: transparent;
            color: var(--ink-xlight);
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.12s;
        }

        .delete-session-btn:hover {
            background: var(--red-bg);
            color: var(--red);
            border-color: var(--red);
        }

        /* ── NOTE CONTAINER ── */
        .note-container {
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }

        .container-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: var(--surface-2);
            border-bottom: 1px solid var(--border);
        }

        .container-header-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--ink-xlight);
            text-transform: uppercase;
            white-space: nowrap;
        }

        .container-header input[type="text"] {
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            font-weight: 700;
            padding: 5px 10px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            flex: 1;
            color: var(--navy-light);
            background: var(--surface);
            transition: all 0.12s;
            letter-spacing: 0.3px;
        }

        .container-header input[type="text"]:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(200,155,60,0.10);
        }

        .delete-round-btn {
            margin-left: auto;
            background: transparent;
            color: var(--ink-xlight);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 5px 10px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.12s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .delete-round-btn:hover {
            background: var(--red-bg);
            color: var(--red);
            border-color: var(--red);
        }

        /* ── BLOCKS ── */
        .block-list {
            display: flex;
            flex-direction: column;
            gap: 1px;
            padding: 12px;
            gap: 10px;
        }

        .block-item {
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
            transition: border-color 0.12s;
            background: var(--surface);
        }

        .block-item:focus-within {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(200,155,60,0.08);
        }

        .block-item.type-good { border-left: 3px solid var(--green); }
        .block-item.type-bad { border-left: 3px solid var(--red); }

        .block-toolbar {
            background: var(--surface-2);
            padding: 6px 10px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 700;
            color: var(--ink-light);
            letter-spacing: 0.3px;
        }

        .block-label-input {
            background: transparent;
            border: 1px solid transparent;
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 11px;
            font-weight: 700;
            font-family: 'Noto Sans JP', sans-serif;
            color: var(--ink-light);
            letter-spacing: 0.3px;
            min-width: 60px;
            max-width: 200px;
            cursor: text;
            transition: all 0.12s;
        }

        .block-label-input:hover {
            border-color: var(--border-strong);
            background: var(--surface);
        }

        .block-label-input:focus {
            outline: none;
            border-color: var(--gold);
            background: var(--surface);
            color: var(--gold-dim);
            box-shadow: 0 0 0 2px rgba(200,155,60,0.10);
        }

        /* ── FORMAT CONTROLS ── */
        .format-controls {
            display: flex;
            align-items: center;
            gap: 5px;
            padding-left: 8px;
            border-left: 1px solid var(--border);
            margin-left: 2px;
        }

        .fmt-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--ink-xlight);
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .fmt-size {
            width: 44px;
            padding: 2px 4px;
            font-size: 11px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--surface);
            color: var(--ink);
            text-align: center;
        }

        .fmt-size:focus { outline: none; border-color: var(--gold); }

        .fmt-select {
            padding: 2px 4px;
            font-size: 11px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--surface);
            color: var(--ink);
            cursor: pointer;
        }

        .fmt-select:focus { outline: none; border-color: var(--gold); }

        .fmt-color {
            width: 26px;
            height: 22px;
            padding: 1px 2px;
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            background: var(--surface);
        }

        .fmt-reset {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            padding: 1px 6px;
            font-size: 12px;
            color: var(--ink-xlight);
            transition: all 0.1s;
            line-height: 1.4;
        }

        .fmt-reset:hover { background: var(--surface-3); color: var(--ink); border-color: var(--border-strong); }

        .block-actions {
            margin-left: auto;
            display: flex;
            gap: 4px;
        }

        .action-btn {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            padding: 2px 7px;
            color: var(--ink-light);
            font-size: 11px;
            transition: all 0.1s;
        }

        .action-btn:hover { background: var(--surface-3); color: var(--ink); }

        .action-btn.delete {
            color: var(--red);
            border-color: rgba(192,57,43,0.25);
        }

        .action-btn.delete:hover {
            background: var(--red-bg);
            border-color: var(--red);
        }

        .block-content { padding: 12px; }

        .rich-editor {
            width: 100%;
            min-height: 72px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 13.5px;
            background: var(--surface);
            overflow-y: auto;
            cursor: text;
            line-height: 1.7;
            color: var(--ink);
            transition: border-color 0.12s;
        }

        .rich-editor:empty:before {
            content: attr(placeholder);
            color: var(--ink-xlight);
            pointer-events: none;
        }

        .rich-editor:focus {
            outline: none;
            border-color: var(--gold);
            background: var(--surface);
        }

        .inline-icon {
            width: 24px;
            height: 24px;
            vertical-align: middle;
            border-radius: 4px;
            margin: 0 3px;
            border: 1px solid var(--border);
        }

        /* ── ADD BLOCK TOOLBAR ── */
        .add-block-bar {
            display: flex;
            gap: 6px;
            padding: 10px 12px;
            border-top: 1px solid var(--border);
            background: var(--surface-2);
        }

        .add-block-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 5px 11px;
            font-size: 11px;
            font-weight: 600;
            color: var(--ink-mid);
            cursor: pointer;
            transition: all 0.12s;
        }

        .add-block-btn:hover {
            border-color: var(--gold);
            color: var(--gold-dim);
            background: var(--gold-pale);
        }

        /* ── IMAGE BLOCK ── */
        .image-upload-area {
            border: 2px dashed var(--border-strong);
            border-radius: var(--radius-sm);
            padding: 28px;
            text-align: center;
            color: var(--ink-xlight);
            background: var(--surface-2);
            font-size: 13px;
        }

        .image-preview { display: flex; justify-content: center; }
        .image-preview img { max-width: 100%; max-height: 300px; border-radius: var(--radius-sm); border: 1px solid var(--border); }

        /* ── WHITEBOARD ── */
        .wb-toolbar-wrapper { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
        .wb-colors { display: flex; gap: 6px; align-items: center; }
        .wb-color-btn { width: 24px; height: 24px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: 0.1s; }
        .wb-color-btn.active { border-color: var(--ink); box-shadow: 0 0 0 2px white inset; }
        .wb-actions { display: flex; gap: 6px; flex-wrap: wrap; }
        .wb-action-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 5px 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: var(--ink-mid);
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.12s;
        }
        .wb-action-btn:hover { background: var(--surface-3); color: var(--ink); }
        .wb-action-btn.active { background: var(--gold-pale); border-color: var(--gold); color: var(--gold-dim); }
        .wb-action-btn.primary { background: var(--navy); color: var(--gold-light); border-color: var(--navy); }
        .wb-action-btn.primary:hover { background: var(--navy-light); }
        .wb-canvas-container { border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; position: relative; }
        canvas.whiteboard { width: 100%; aspect-ratio: 16/9; height: auto; cursor: crosshair; display: block; }

        /* ── TIER LIST BLOCK ── */
        .tier-list { border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface-2); overflow: hidden; display: flex; flex-direction: column; gap: 1px; }
        .tier-row { display: flex; background: var(--surface); min-height: 60px; }
        .tier-label-box { width: 80px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; color: var(--ink); text-shadow: 0 1px 2px rgba(255,255,255,0.5); border-right: 1px solid var(--border); position: relative; }
        .tier-label-box > div { padding: 4px; border-radius: 4px; text-align: center; width: 100%; word-break: break-all; outline: none; }
        .tier-label-box > div:focus { background: rgba(255,255,255,0.5); }
        .tier-items { flex: 1; display: flex; flex-wrap: wrap; gap: 8px; padding: 10px; align-items: flex-start; min-height: 60px; }
        .tier-item {
            width: 54px;
            height: auto;
            border-radius: var(--radius-sm);
            overflow: hidden;
            cursor: grab;
            position: relative;
            border: 1px solid var(--border);
            background: var(--surface-3);
            display: flex;
            flex-direction: column;
        }
        .tier-item img { width: 100%; height: 54px; object-fit: cover; }
        .tier-item .del-btn { position: absolute; top: -4px; right: -4px; background: var(--red); color: white; border-radius: 50%; width: 16px; height: 16px; font-size: 10px; display: none; align-items: center; justify-content: center; cursor: pointer; border: none; z-index: 10; padding: 0; }
        .tier-item:hover .del-btn { display: flex; }
        .tier-item-name {
            font-size: 5px; color: var(--ink-mid); text-align: center;
            line-height: 1.2; padding: 2px; width: 100%;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            font-weight: 500;
        }
        .tier-add-row { background: var(--surface-2); border: none; padding: 8px; cursor: pointer; font-weight: 700; color: var(--ink-light); transition: 0.2s; font-size: 12px; }
        .tier-add-row:hover { background: var(--surface-3); color: var(--ink); }
        .tier-color-picker { position: absolute; bottom: 2px; right: 2px; width: 16px; height: 16px; padding: 0; border: none; border-radius: 4px; overflow: hidden; cursor: pointer; opacity: 0; transition: opacity 0.2s; }
        .tier-label-box:hover .tier-color-picker { opacity: 1; }
        .tier-row-controls { display: flex; flex-direction: column; width: 24px; background: var(--surface-2); border-left: 1px solid var(--border); }
        .tier-row-btn { flex: 1; border: none; background: transparent; cursor: pointer; font-size: 10px; color: var(--ink-xlight); transition: 0.1s; }
        .tier-row-btn:hover { background: var(--surface-3); color: var(--ink); }

        /* ── BOARD BLOCK ── */
        .board-container { display: flex; justify-content: space-between; align-items: flex-start; padding: 20px; background: var(--surface-2); border-radius: var(--radius-sm); border: 1px solid var(--border); overflow-x: auto; }
        .board-grid { display: flex; flex-direction: column; gap: 4px; margin: 0 auto; }
        .board-spacer { width: 160px; flex-shrink: 0; }
        .board-row { display: flex; gap: 4px; }
        .board-row.odd { margin-left: 36px; }
        .board-hex-cell { width: 68px; height: 68px; position: relative; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .board-hex-bg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
        .board-hex-bg polygon { fill: var(--surface); stroke: var(--border-strong); stroke-width: 1; transition: 0.2s; }
        .board-hex-cell.drag-over .board-hex-bg polygon { fill: rgba(26,159,255,0.2) !important; stroke: rgba(26,159,255,0.9) !important; }
        .board-hex-champ { width: 90%; height: 90%; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); overflow: hidden; position: relative; z-index: 1; cursor: grab; background: #000; }
        .board-hex-champ-img { width: 100%; height: 100%; object-fit: cover; }
        .board-hex-champ-overlay { position: absolute; inset: 0; background: linear-gradient(transparent 55%, rgba(0,0,0,0.8)); pointer-events: none; }
        .board-hex-items { position: absolute; top: 6px; left: 50%; transform: translateX(-50%); display: flex; gap: 2px; z-index: 2; pointer-events: auto; }
        .board-hex-item { width: 18px; height: 18px; border: 1px solid rgba(255,255,255,0.8); border-radius: 2px; background: black; cursor: pointer; transition: 0.1s; }
        .board-hex-item:hover { border-color: var(--red); transform: scale(1.1); }
        .board-hex-del-btn { position: absolute; top: -2px; right: -2px; background: var(--red); color: white; width: 18px; height: 18px; border-radius: 50%; font-size: 10px; display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 10; border: 1px solid white; }
        .board-hex-cell:hover .board-hex-del-btn { display: flex; }
        .board-traits-panel { width: 160px; flex-shrink: 0; background: var(--surface); border-radius: var(--radius-sm); border: 1px solid var(--border); padding: 12px; display: flex; flex-direction: column; gap: 6px; }
        .board-traits-title { font-size: 9px; color: var(--gold-dim); font-weight: 700; text-align: center; margin-bottom: 6px; letter-spacing: 1px; }
        .board-trait-item { display: flex; align-items: center; justify-content: space-between; background: var(--surface-2); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border); }
        .board-trait-name { font-size: 9px; color: var(--ink); font-weight: 600; text-shadow: none; }
        .board-trait-count { font-size: 9px; color: var(--navy); font-weight: 700; background: var(--gold-pale); border: 1px solid var(--gold-light); padding: 0 5px; border-radius: 4px; }

        /* ── FLOWCHART BLOCK ── */
        .flowchart-toolbar {
            padding: 8px 10px;
            background: var(--surface-2);
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 8px;
        }
        .flowchart-container {
            position: relative;
            width: 100%;
            min-height: 400px;
            background-color: var(--surface-2);
            background-image: radial-gradient(var(--border-strong) 0.5px, transparent 0.5px);
            background-size: 15px 15px;
            border-radius: var(--radius-sm);
            overflow: hidden;
        }
        .flowchart-node {
            position: absolute;
            background: var(--surface);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-md);
            cursor: move;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: box-shadow 0.2s, border-color 0.2s;
        }
        .flowchart-node::after {
            content: '';
            position: absolute;
            top: -30px;
            left: 0;
            right: 0;
            height: 30px;
            z-index: -1;
        }
        .flowchart-node:hover { border-color: var(--gold); z-index: 10; }
        .flowchart-node.dragging { z-index: 11; box-shadow: var(--shadow-lg); border-color: var(--blue); }
        .flowchart-node-icon { width: 64px; height: 64px; padding: 0; }
        .flowchart-node-icon img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; border-radius: calc(var(--radius-sm) - 1px); }
        .flowchart-node-text { padding: 10px; font-size: 13px; line-height: 1.4; min-width: 80px; min-height: 40px; }
        .flowchart-node-text .node-content { outline: none; cursor: text; width: 100%; height: 100%; overflow-y: auto; }
        .flowchart-node .node-action-bar {
            position: absolute;
            top: -26px;
            right: -2px;
            display: none;
            gap: 4px;
            z-index: 12;
        }
        .flowchart-node:hover .node-action-bar { display: flex; }
        .fc-btn {
            background: var(--surface); color: var(--ink-mid); border: 1px solid var(--border-strong); border-radius: 4px;
            width: 22px; height: 22px; font-size: 11px; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0;
        }
        .fc-btn:hover { background: var(--surface-3); color: var(--ink); }
        .fc-btn.del { background: var(--red-bg); color: var(--red); border-color: var(--red); }
        .fc-btn.del:hover { background: var(--red); color: white; }
        .flowchart-container.linking-mode .flowchart-node {
            cursor: crosshair; border-color: var(--blue); box-shadow: 0 0 0 2px var(--blue);
        }
        .flowchart-edges line:hover { stroke: var(--red); stroke-width: 3; }
        .resize-handle {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 14px;
            height: 14px;
            cursor: nwse-resize;
            z-index: 15;
            background: linear-gradient(135deg, transparent 50%, var(--border-strong) 50%);
            border-bottom-right-radius: var(--radius-sm);
        }

        /* ── ASSET DRAWER ── */
        .asset-drawer {
            width: 340px;
            margin-right: -340px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            z-index: 200;
            transition: margin-right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .asset-drawer.open { margin-right: 0; }

        .drawer-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--navy);
        }

        .drawer-header h3 {
            color: var(--gold-light);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        .close-drawer-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.7);
            width: 28px;
            height: 28px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.12s;
        }

        .close-drawer-btn:hover { background: rgba(255,255,255,0.2); color: white; }

        .drawer-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }

        .drawer-tab {
            flex: 1;
            padding: 10px 0;
            border: none;
            background: var(--surface-2);
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            color: var(--ink-light);
            border-bottom: 2px solid transparent;
            transition: all 0.12s;
            letter-spacing: 0.3px;
        }

        .drawer-tab.active {
            background: var(--surface);
            border-color: var(--gold);
            color: var(--gold-dim);
        }

        .drawer-content {
            padding: 14px;
            overflow-y: auto;
            flex: 1;
            display: none;
        }

        .drawer-content.active { display: block; }

        .drawer-section-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--ink-xlight);
            margin-top: 14px;
            margin-bottom: 8px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 4px;
        }
        
        .drawer-section-title:first-child { margin-top: 0; }

        .drawer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .asset-icon {
            width: 100%;
            aspect-ratio: 1;
            border-radius: var(--radius-sm);
            cursor: grab;
            border: 2px solid transparent;
            object-fit: cover;
            transition: all 0.1s;
            background: var(--surface-3);
        }

        .asset-icon[data-cost="1"] { border-color: #8a9aaa; border-width: 2px; }
        .asset-icon[data-cost="2"] { border-color: #44cc66; border-width: 2px; }
        .asset-icon[data-cost="3"] { border-color: #3399ff; border-width: 2px; }
        .asset-icon[data-cost="4"] { border-color: #cc44ff; border-width: 2px; }
        .asset-icon[data-cost="5"] { border-color: #ffcc44; border-width: 2px; }
        
        .asset-icon[data-tier="silver"] { border-color: #A0A5A9; border-width: 2px; }
        .asset-icon[data-tier="gold"] { border-color: #C89B3C; border-width: 2px; }
        .asset-icon[data-tier="prismatic"] { border-color: #D488FD; border-width: 2px; }

        .asset-icon:hover { transform: scale(1.06); box-shadow: var(--shadow-md); border-color: var(--gold); }
        .asset-icon:active { cursor: grabbing; transform: scale(0.95); }

        /* ── SUMMARY / REPORT ── */
        .summary-view {
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            padding: 28px 32px;
            box-shadow: var(--shadow-sm);
        }

        .summary-stage { margin-bottom: 36px; }
        .summary-title {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 1px;
            color: var(--navy-light);
            border-bottom: 2px solid var(--border);
            padding-bottom: 8px;
            margin-bottom: 18px;
        }

        .summary-container { margin-bottom: 24px; padding-left: 14px; border-left: 3px solid var(--gold); }
        .sum-block { margin-bottom: 14px; }
        .sum-text { font-size: 14px; line-height: 1.7; white-space: pre-wrap; color: var(--ink); }
        .sum-text.good { color: var(--green); padding: 10px 14px; background: var(--green-bg); border-radius: var(--radius-sm); }
        .sum-text.bad { color: var(--red); padding: 10px 14px; background: var(--red-bg); border-radius: var(--radius-sm); }
        .sum-img { max-width: 100%; border-radius: var(--radius-sm); border: 1px solid var(--border); }

        .print-btn {
            background: var(--navy);
            color: var(--gold-light);
            border: none;
            padding: 9px 18px;
            border-radius: var(--radius-sm);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 18px;
            letter-spacing: 0.5px;
            transition: all 0.15s;
        }

        .print-btn:hover { background: var(--navy-light); }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--ink-xlight);
            font-size: 13px;
        }

        .empty-state .emoji { font-size: 32px; margin-bottom: 12px; }

        @media print {
            body { 
                background: white; 
                overflow: visible; 
                height: auto; 
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
            }
            .app-header, .sidebar, .print-btn, .asset-drawer { display: none !important; }
            .main-content { padding: 0; overflow: visible; background: white; }
            .summary-view { box-shadow: none; border: none; padding: 0; }
        }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="header-logo">
            <div class="header-logo-mark">TFT</div>
            <span class="header-logo-text">COACHING NOTES</span>
        </div>
        <div class="header-links">
            <a href="ここに使い方ページのURLを入れる" target="_blank" class="link-btn">
                📖 使い方説明
            </a>
            <a href="ここに使用例ページのURLを入れる" target="_blank" class="link-btn">
                💡 ノートの使用例
            </a>
            <a href="https://metatft.com/" target="_blank" class="link-btn">
                <img src="https://www.metatft.com/logo.svg" alt="MetaTFT"> MetaTFT
            </a>
            <a href="https://tftips.app/" target="_blank" class="link-btn">
                <img src="https://tftips.app/favicon.ico" alt="TFTips"> TFTips
            </a>
        </div>
        <div id="header-actions" class="header-actions">
            <button class="header-btn btn-ghost" onclick="toggleDrawer()">🎒 アセット</button>
            <button class="header-btn btn-primary" onclick="addRound()">＋ 枠を追加</button>
        </div>
    </header>

    <div class="app-container">
        <div class="sidebar">
            <button id="home-btn" class="stage-btn home-btn active" onclick="showHome()">🏠 ホーム (履歴)</button>

            <div class="sidebar-section-label">ステージ</div>
            <div id="stage-list"></div>

            <div class="sidebar-footer">
                <button id="summary-btn" class="stage-btn summary-btn" onclick="showSummary()">📝 レポート出力</button>
            </div>
        </div>

        <div class="main-content" id="main-content"></div>

        <div id="asset-drawer" class="asset-drawer">
        <div class="drawer-header">
            <h3>🎒 アセットパネル</h3>
            <button class="close-drawer-btn" onclick="toggleDrawer()">×</button>
        </div>
        <div class="drawer-tabs">
            <button class="drawer-tab active" onclick="switchDrawerTab('champ', this)">駒</button>
            <button class="drawer-tab" onclick="switchDrawerTab('item', this)">アイテム</button>
            <button class="drawer-tab" onclick="switchDrawerTab('aug', this)">オーグメント</button>
        </div>
        <div id="drawer-champ" class="drawer-content active"></div>
        <div id="drawer-item" class="drawer-content"></div>
        <div id="drawer-aug" class="drawer-content"></div>
        </div>
    </div>

    <script>
        const defaultStages = ['プロローグ', 'Stage 1', 'Stage 2', 'Stage 3', 'Stage 4', 'Stage 5', 'Stage 6', 'Stage 7', '総括', '今日の座学'];
        let currentStage = 'Home';
        let appData = { sessions: {}, currentId: null };
        let db = {};

        const genId = () => 'id_' + Date.now() + Math.random().toString(36).substr(2, 9);
        function createBlock(type) { 
            let content = null;
            if (type === 'tier') {
                content = JSON.stringify([
                    {id: genId(), label: 'S', color: '#ff7f7f', items: []},
                    {id: genId(), label: 'A', color: '#ffbf7f', items: []},
                    {id: genId(), label: 'B', color: '#ffff7f', items: []},
                    {id: genId(), label: 'C', color: '#7fff7f', items: []}
                ]);
            } else if (type === 'board') {
                content = JSON.stringify(Array(28).fill(null));
            } else if (type === 'flowchart') {
                content = JSON.stringify({ nodes: [], edges: [] });
            }
            return { id: genId(), type: type, content: content, label: null, format: { fontSize: 13, fontWeight: 'normal', color: '' } }; 
        }
        function createRound(name, defaultBlocks = ['good', 'bad', 'text']) { 
            return { 
                id: genId(), 
                name: name, 
                blocks: defaultBlocks.map(type => createBlock(type)) 
            }; 
        }

        function createInitialDB() {
            let newDb = {};
            defaultStages.forEach(s => newDb[s] = []);
            
            newDb['プロローグ'].push(createRound('事前準備・方針', ['text']));

            ['1-2', '1-3', '1-4'].forEach(name => newDb['Stage 1'].push(createRound(name)));
            
            [2, 3, 4].forEach(s => {
                for (let i = 1; i <= 7; i++) {
                    newDb[`Stage ${s}`].push(createRound(`${s}-${i}${i === 4 ? '(神々の選択)' : ''}`));
                }
            });
            
            [5, 6, 7].forEach(s => {
                for (let i = 1; i <= 7; i++) {
                    newDb[`Stage ${s}`].push(createRound(`${s}-${i}`));
                }
            });
            
            newDb['総括'].push(createRound('全体振り返り'));
            newDb['今日の座学'].push(createRound('学んだこと', ['text']));

            return newDb;
        }

        function saveToLocal() { localStorage.setItem('tftCoachingData_v4', JSON.stringify(appData)); }

        function loadFromLocal() {
            const savedV4 = localStorage.getItem('tftCoachingData_v4');
            if (savedV4) {
                appData = JSON.parse(savedV4);
                // 古いデータにstages情報がない場合の互換性対応
                Object.values(appData.sessions).forEach(session => {
                    if (!session.stages) {
                        session.stages = Object.keys(session.data);
                    }
                });
            } else {
                const savedV3 = localStorage.getItem('tftCoachingData_v3');
                const newId = genId();
                appData = {
                    sessions: {
                        [newId]: {
                            id: newId,
                            title: '過去のコーチングノート',
                            date: new Date().toISOString(),
                            stages: savedV3 ? Object.keys(JSON.parse(savedV3)) : [...defaultStages],
                            data: savedV3 ? JSON.parse(savedV3) : createInitialDB()
                        }
                    },
                    currentId: newId
                };
                saveToLocal();
            }
            if (appData.currentId && appData.sessions[appData.currentId]) {
                db = appData.sessions[appData.currentId].data;
            }
        }

        function formatDate(isoString) {
            const d = new Date(isoString);
            return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        }

        function createNewSession() {
            const id = genId();
            appData.sessions[id] = { id, title: '新規コーチングノート', date: new Date().toISOString(), stages: [...defaultStages], data: createInitialDB() };
            loadSession(id);
        }

        function loadSession(id) {
            appData.currentId = id;
            db = appData.sessions[id].data;
            currentStage = appData.sessions[id].stages[0] || 'Home';
            saveToLocal();
            renderSidebar();
            renderMainArea();
        }

        function deleteSession(e, id) {
            e.stopPropagation();
            if (confirm('このコーチングノートを完全に削除しますか？')) {
                delete appData.sessions[id];
                if (appData.currentId === id) appData.currentId = null;
                saveToLocal();
                showHome();
            }
        }

        function updateSessionTitle(title) {
            if (appData.currentId) { appData.sessions[appData.currentId].title = title; saveToLocal(); }
        }

        function addCategory() {
            const name = prompt('新しいカテゴリー名を入力してください:');
            if (!name || name.trim() === '') return;
            const sName = name.trim();
            const session = appData.sessions[appData.currentId];
            if (session.stages.includes(sName)) { alert('そのカテゴリー名は既に存在します。'); return; }
            session.stages.push(sName);
            session.data[sName] = [];
            currentStage = sName;
            saveToLocal();
            renderSidebar();
            renderMainArea();
        }

        function editCategory(oldName) {
            const name = prompt('新しいカテゴリー名を入力してください:', oldName);
            if (!name || name.trim() === '' || name.trim() === oldName) return;
            const newName = name.trim();
            const session = appData.sessions[appData.currentId];
            if (session.stages.includes(newName)) { alert('そのカテゴリー名は既に存在します。'); return; }
            const idx = session.stages.indexOf(oldName);
            if (idx > -1) session.stages[idx] = newName;
            session.data[newName] = session.data[oldName];
            delete session.data[oldName];
            if (currentStage === oldName) currentStage = newName;
            saveToLocal();
            renderSidebar();
            renderMainArea();
        }

        function deleteCategory(name) {
            if (!confirm(`カテゴリー「${name}」を削除しますか？\n(含まれるすべてのノートが消去されます)`)) return;
            const session = appData.sessions[appData.currentId];
            const idx = session.stages.indexOf(name);
            if (idx > -1) session.stages.splice(idx, 1);
            delete session.data[name];
            if (currentStage === name) currentStage = session.stages.length > 0 ? session.stages[0] : 'Home';
            saveToLocal();
            renderSidebar();
            renderMainArea();
        }

        const TRAIT_JA = {
            'N.O.V.A.': 'N.O.V.A.', 'Bastion': 'バスティオン', 'Anima': 'アニマ', 'Primordian': 'プライモーディアン',

        function handleRichTextInput(e, editorEle, roundId, blockId) {
            if (isComposing) return;
            const selection = window.getSelection();
            if (!selection.rangeCount) return;
            const range = selection.getRangeAt(0);
            const node = range.startContainer;
            if (node.nodeType === Node.TEXT_NODE) {
                let text = node.textContent;
                let cursorOffset = range.startOffset;
                const textBeforeCursor = text.substring(0, cursorOffset);
                for (let key in iconDict) {
                    if (textBeforeCursor.endsWith(key)) {
                        const url = iconDict[key];
                        const textAfterCursor = text.substring(cursorOffset);
                        const newTextBefore = textBeforeCursor.substring(0, textBeforeCursor.length - key.length);
                        node.textContent = newTextBefore;
                        const img = document.createElement('img');
                        img.src = url; img.className = 'inline-icon'; img.alt = key;
                        const afterTextNode = document.createTextNode(textAfterCursor);
                        node.parentNode.insertBefore(img, node.nextSibling);
                        node.parentNode.insertBefore(afterTextNode, img.nextSibling);
                        const newRange = document.createRange();
                        newRange.setStart(afterTextNode, 0); newRange.collapse(true);
                        selection.removeAllRanges(); selection.addRange(newRange);
                        break;
                    }
                }
            }
            updateBlockContent(roundId, blockId, editorEle.innerHTML);
        }

                    }

                    let moverChampUrl = data.url;
                    let moverItems = [];
                    if (data.source === 'board' && data.blockId === blockId) {
                        const srcCell = boardData[data.cellIdx];
                        if (srcCell) { moverItems = srcCell.items || []; boardData[data.cellIdx] = null; }
                    }
                    const existing = boardData[targetIdx];
                    boardData[targetIdx] = { champ: moverChampUrl, items: moverItems };

        let draggingNodeInfo = null;
        function startNodeDrag(e, roundId, blockId, nodeId) {
            if (connectingSource && connectingSource.blockId === blockId) {
                e.preventDefault();
                e.stopPropagation();
                if (connectingSource.nodeId !== nodeId) {
                    const round = db[currentStage].find(r => r.id === roundId);
                    const block = round.blocks.find(b => b.id === blockId);
                    let flowData = JSON.parse(block.content || '{"nodes":[],"edges":[]}');
                    if (!flowData.edges) flowData.edges = [];
                    const exists = flowData.edges.find(edge => (edge.from === connectingSource.nodeId && edge.to === nodeId) || (edge.from === nodeId && edge.to === connectingSource.nodeId));
                    if (!exists) {
                        flowData.edges.push({ from: connectingSource.nodeId, to: nodeId });
                        block.content = JSON.stringify(flowData);
                        saveToLocal();
                        renderMainArea();
                    }
                }
                const container = document.getElementById(`fc-${blockId}`);
                if (container) container.classList.remove('linking-mode');
                connectingSource = null;
                return;
            }

            if (e.target.closest('.node-content') || e.target.closest('.node-action-bar') || e.target.closest('.resize-handle')) return;
            e.preventDefault();
            const nodeElement = document.getElementById(nodeId);
            if (!nodeElement) return;
            const container = nodeElement.parentElement;
            const containerRect = container.getBoundingClientRect();
            const nodeRect = nodeElement.getBoundingClientRect();
            draggingNodeInfo = { roundId, blockId, nodeId, offsetX: e.clientX - nodeRect.left, offsetY: e.clientY - nodeRect.top, element: nodeElement, containerRect };
            nodeElement.classList.add('dragging');
            document.addEventListener('mousemove', handleNodeDrag);
            document.addEventListener('mouseup', stopNodeDrag);
        }
        function handleNodeDrag(e) {
            if (!draggingNodeInfo) return;
            const { element, offsetX, offsetY, containerRect } = draggingNodeInfo;
            let x = e.clientX - containerRect.left - offsetX;
            let y = e.clientY - containerRect.top - offsetY;
            x = Math.round(x / 15) * 15;
            y = Math.round(y / 15) * 15;
            element.style.left = `${x}px`;
            element.style.top = `${y}px`;

            const container = element.parentElement;
            const currentMinHeight = parseInt(container.style.minHeight || 400);
            if (y + element.offsetHeight + 80 > currentMinHeight) {
                container.style.minHeight = `${y + element.offsetHeight + 80}px`;
            }
            drawAllFlowchartEdges();
        }
        function stopNodeDrag(e) {
            if (!draggingNodeInfo) return;
            const { roundId, blockId, nodeId, element } = draggingNodeInfo;
            const newX = parseInt(element.style.left, 10);
            const newY = parseInt(element.style.top, 10);
            const round = db[currentStage].find(r => r.id === roundId);
            const block = round.blocks.find(b => b.id === blockId);
            let flowData = JSON.parse(block.content);
            const node = flowData.nodes.find(n => n.id === nodeId);
            if (node) { node.x = newX; node.y = newY; }
            block.content = JSON.stringify(flowData);
            saveToLocal();
            element.classList.remove('dragging');
            draggingNodeInfo = null;
            document.removeEventListener('mousemove', handleNodeDrag);
            document.removeEventListener('mouseup', stopNodeDrag);
        }

        let connectingSource = null;
        function startConnectNode(roundId, blockId, nodeId) {
            connectingSource = { roundId, blockId, nodeId };
            const container = document.getElementById(`fc-${blockId}`);
            if (container) container.classList.add('linking-mode');
        }

        let resizingNodeInfo = null;
        function startNodeResize(e, roundId, blockId, nodeId) {
            e.preventDefault();
            e.stopPropagation();
            const nodeElement = document.getElementById(nodeId);
            if (!nodeElement) return;
            const startWidth = nodeElement.offsetWidth;
            const startHeight = nodeElement.offsetHeight;
            const startX = e.clientX;
            const startY = e.clientY;
            resizingNodeInfo = { roundId, blockId, nodeId, element: nodeElement, startWidth, startHeight, startX, startY };
            document.addEventListener('mousemove', handleNodeResize);
            document.addEventListener('mouseup', stopNodeResize);
        }
        function handleNodeResize(e) {
            if (!resizingNodeInfo) return;
            const { element, startWidth, startHeight, startX, startY } = resizingNodeInfo;
            const newWidth = Math.max(32, startWidth + (e.clientX - startX));
            const newHeight = Math.max(32, startHeight + (e.clientY - startY));
            element.style.width = `${newWidth}px`;
            element.style.height = `${newHeight}px`;

            const container = element.parentElement;
            const currentMinHeight = parseInt(container.style.minHeight || 400);
            const y = parseInt(element.style.top || 0);
            if (y + newHeight + 80 > currentMinHeight) {
                container.style.minHeight = `${y + newHeight + 80}px`;
            }
            drawAllFlowchartEdges();
        }
        function stopNodeResize(e) {
            if (!resizingNodeInfo) return;
            const { roundId, blockId, nodeId, element } = resizingNodeInfo;
            const newWidth = parseInt(element.style.width, 10);
            const newHeight = parseInt(element.style.height, 10);
            const round = db[currentStage].find(r => r.id === roundId);
            const block = round.blocks.find(b => b.id === blockId);
            let flowData = JSON.parse(block.content);
            const node = flowData.nodes.find(n => n.id === nodeId);
            if (node) { node.width = newWidth; node.height = newHeight; }
            block.content = JSON.stringify(flowData);
            saveToLocal();
            resizingNodeInfo = null;
            document.removeEventListener('mousemove', handleNodeResize);
            document.removeEventListener('mouseup', stopNodeResize);
        }

        window.deleteFlowchartEdge = function(roundId, blockId, edgeIdx) {
            const round = db[currentStage].find(r => r.id === roundId);
            if (!round) return;
            const block = round.blocks.find(b => b.id === blockId);
            if (!block) return;
            let flowData = JSON.parse(block.content || '{"nodes":[],"edges":[]}');
            if (flowData.edges) flowData.edges.splice(edgeIdx, 1);
            block.content = JSON.stringify(flowData);
            saveToLocal(); drawAllFlowchartEdges();
        };

        let savedRange = null;
        document.addEventListener('selectionchange', () => {
            const selection = window.getSelection();
            if (selection.rangeCount > 0) {
                const range = selection.getRangeAt(0);
                let node = range.commonAncestorContainer;
                if (node && node.nodeType === Node.TEXT_NODE) node = node.parentNode;
                if (node && node.closest('.rich-editor')) {
                    savedRange = range.cloneRange();
                }
            }
        });

        function applyInlineFormat(editor, key, value) {
            if (!savedRange) return false;
            let node = savedRange.commonAncestorContainer;
            if (node && node.nodeType === Node.TEXT_NODE) node = node.parentNode;
            if (!editor.contains(node)) return false;
            if (savedRange.collapsed) return false;

            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(savedRange);
            document.execCommand('styleWithCSS', false, true);

            if (key === 'color') {
                document.execCommand('foreColor', false, value);
            } else {
                const tempFontName = 'TMP_FONT_' + Date.now();
                document.execCommand('fontName', false, tempFontName);
                const elements = editor.querySelectorAll(`span[style*="${tempFontName}"], font[face="${tempFontName}"]`);
                elements.forEach(el => {
                    if (el.tagName === 'FONT') {
                        const span = document.createElement('span');
                        if (key === 'fontSize') span.style.fontSize = value + 'px';
                        if (key === 'fontWeight') span.style.fontWeight = value;
                        span.innerHTML = el.innerHTML;
                        el.parentNode.replaceChild(span, el);
                    } else {
                        el.style.fontFamily = '';
                        if (key === 'fontSize') el.style.fontSize = value + 'px';
                        if (key === 'fontWeight') el.style.fontWeight = value;
                        if (el.getAttribute('style') === '') el.removeAttribute('style');
                    }
                });
            }

            editor.querySelectorAll('span[style=""]').forEach(s => {
                const frag = document.createDocumentFragment();
                while(s.firstChild) frag.appendChild(s.firstChild);
                s.parentNode.replaceChild(frag, s);
            });
            return true;
        }

        function updateBlockFormat(roundId, blockId, key, value) {
            const round = db[currentStage].find(r => r.id === roundId);
            if (round) {
                const block = round.blocks.find(b => b.id === blockId);
                if (block) {
                    const editor = document.querySelector(`.rich-editor[data-block-id="${blockId}"]`);
                    let inlineApplied = false;
                    if (editor) {
                        inlineApplied = applyInlineFormat(editor, key, value);
                        if (inlineApplied) {
                            block.content = editor.innerHTML;
                            saveToLocal();
                        }
                    }
                    if (!inlineApplied) {
                        if (!block.format) block.format = { fontSize: 13, fontWeight: 'normal', color: '' };
                        block.format[key] = value;
                        saveToLocal();
                        if (editor) applyEditorStyle(editor, block.format);
                    }
                }
            }
        }

        function applyEditorStyle(editor, format) {
            if (!format) return;
            editor.style.fontSize = (format.fontSize || 13) + 'px';
            editor.style.fontWeight = format.fontWeight || 'normal';
            editor.style.color = format.color || '';
        }

        function resetBlockFormat(roundId, blockId) {
            const round = db[currentStage].find(r => r.id === roundId);
            if (round) {
                const block = round.blocks.find(b => b.id === blockId);
                if (block) {
                    const editor = document.querySelector(`.rich-editor[data-block-id="${blockId}"]`);
                    let inlineApplied = false;
                    if (editor && savedRange && !savedRange.collapsed) {
                        let node = savedRange.commonAncestorContainer;
                        if (node && node.nodeType === Node.TEXT_NODE) node = node.parentNode;
                        if (editor.contains(node)) {
                            const selection = window.getSelection();
                            selection.removeAllRanges();
                            selection.addRange(savedRange);
                            document.execCommand('removeFormat', false, null);
                            
                            const tempFontName = 'TMP_FONT_' + Date.now();
                            document.execCommand('fontName', false, tempFontName);
                            const elements = editor.querySelectorAll(`span[style*="${tempFontName}"], font[face="${tempFontName}"]`);
                            elements.forEach(el => {
                                if (el.tagName === 'FONT') {
                                    const text = document.createTextNode(el.textContent);
                                    el.parentNode.replaceChild(text, el);
                                } else {
                                    el.removeAttribute('style');
                                }
                            });
                            
                            block.content = editor.innerHTML;
                            saveToLocal();
                            inlineApplied = true;
                        }
                    }
                    if (!inlineApplied) {
                        block.format = { fontSize: 13, fontWeight: 'normal', color: '' };
                        saveToLocal();
                        renderMainArea();
                    }
                }
            }
        }

        function addRound() {
            const defaultBlocks = ['プロローグ', '今日の座学'].includes(currentStage) ? ['text'] : ['good', 'bad', 'text'];
            db[currentStage].push(createRound('', defaultBlocks));
            saveToLocal(); renderMainArea();
            setTimeout(() => { const mc = document.getElementById('main-content'); mc.scrollTo({ top: mc.scrollHeight, behavior: 'smooth' }); }, 100);
        }

        function deleteRound(roundId) {
            if (confirm('この枠を削除しますか？')) { db[currentStage] = db[currentStage].filter(r => r.id !== roundId); saveToLocal(); renderMainArea(); }
        }

        function updateRoundName(roundId, name) {
            const round = db[currentStage].find(r => r.id === roundId);
            if (round) { round.name = name; saveToLocal(); }
        }

        function handleImageUpload(e, roundId, blockId) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(evt) { updateBlockContent(roundId, blockId, evt.target.result); renderMainArea(); }
                reader.readAsDataURL(file);
            }
        }

        let canvases = {};
        const wbColors = ['#1C2333', '#C0392B', '#185FA5', '#1A8A5A', '#E0A020', '#E17055', '#6c5ce7', '#fd79a8', '#00cec9', '#A8B3CC'];

        function initWhiteboards() {
            if (currentStage === 'Home' || currentStage === 'Summary') return;
            document.querySelectorAll('.whiteboard').forEach(canvas => {
                if (canvas.dataset.initialized) return;
                const blockId = canvas.dataset.blockId; const roundId = canvas.dataset.roundId; const ctx = canvas.getContext('2d');
                canvas.width = 1280; canvas.height = 720; 
                ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                const block = db[currentStage].find(r => r.id === roundId).blocks.find(b => b.id === blockId);
                canvases[blockId] = { canvas, ctx, isDrawing: false, color: '#C0392B', isEraser: false, roundId, blockId, undoStack: [], redoStack: [] };
                if (block && block.content) {
                    let img = new Image(); img.onload = () => { ctx.drawImage(img, 0, 0); saveWbState(blockId); }; img.src = block.content;
                } else { ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height); saveWbState(blockId); }
                canvas.addEventListener('mousedown', (e) => startDraw(e, blockId));
                canvas.addEventListener('mousemove', (e) => draw(e, blockId));
                canvas.addEventListener('mouseup', () => stopDraw(blockId));
                canvas.addEventListener('mouseout', () => stopDraw(blockId));
                canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e, blockId); }, {passive: false});
                canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e, blockId); }, {passive: false});
                canvas.addEventListener('touchend', () => stopDraw(blockId));
                canvas.dataset.initialized = "true"; updateWbUI(blockId);
            });
        }

        function saveWbState(id) { const cvs = canvases[id]; if (cvs.undoStack.length >= 20) cvs.undoStack.shift(); cvs.undoStack.push(cvs.canvas.toDataURL()); cvs.redoStack = []; }

        window.handleWbBgUpload = function(e, roundId, blockId) {
            const file = e.target.files[0]; if (!file) return; const reader = new FileReader();
            reader.onload = function(evt) {
                const img = new Image();
                img.onload = function() {
                    const cvs = canvases[blockId]; cvs.ctx.fillStyle = '#ffffff'; cvs.ctx.fillRect(0, 0, cvs.canvas.width, cvs.canvas.height);
                    const ratio = Math.min(cvs.canvas.width / img.width, cvs.canvas.height / img.height);
                    cvs.ctx.drawImage(img, 0, 0, img.width, img.height, (cvs.canvas.width - img.width * ratio) / 2, (cvs.canvas.height - img.height * ratio) / 2, img.width * ratio, img.height * ratio);
                    saveWbState(blockId); updateBlockContent(roundId, blockId, cvs.undoStack[cvs.undoStack.length - 1]);
                }
                img.src = evt.target.result;
            }
            reader.readAsDataURL(file); e.target.value = '';
        }

        function getMousePos(canvas, evt) { const rect = canvas.getBoundingClientRect(); return { x: (evt.clientX - rect.left) * (canvas.width / rect.width), y: (evt.clientY - rect.top) * (canvas.height / rect.height) }; }
        function startDraw(e, id) { canvases[id].isDrawing = true; canvases[id].ctx.beginPath(); draw(e, id); }
        function draw(e, id) {
            const cvs = canvases[id]; if (!cvs.isDrawing) return; const pos = getMousePos(cvs.canvas, e);
            cvs.ctx.strokeStyle = cvs.isEraser ? '#ffffff' : cvs.color; cvs.ctx.lineWidth = cvs.isEraser ? 40 : 5;
            cvs.ctx.lineTo(pos.x, pos.y); cvs.ctx.stroke(); cvs.ctx.beginPath(); cvs.ctx.moveTo(pos.x, pos.y);
        }
        function stopDraw(id) { const cvs = canvases[id]; if (!cvs.isDrawing) return; cvs.isDrawing = false; cvs.ctx.beginPath(); saveWbState(id); updateBlockContent(cvs.roundId, cvs.blockId, cvs.undoStack[cvs.undoStack.length - 1]); }
        window.setWbColor = function(blockId, color) { canvases[blockId].color = color; canvases[blockId].isEraser = false; updateWbUI(blockId); }
        window.setWbEraser = function(blockId) { canvases[blockId].isEraser = true; updateWbUI(blockId); }
        window.wbUndo = function(id) {
            const cvs = canvases[id];
            if (cvs.undoStack.length > 1) {
                cvs.redoStack.push(cvs.undoStack.pop()); const prevState = cvs.undoStack[cvs.undoStack.length - 1];
                const img = new Image(); img.onload = () => { cvs.ctx.clearRect(0, 0, cvs.canvas.width, cvs.canvas.height); cvs.ctx.drawImage(img, 0, 0); };
                img.src = prevState; updateBlockContent(cvs.roundId, cvs.blockId, prevState);
            }
        }
        window.wbRedo = function(id) {
            const cvs = canvases[id];
            if (cvs.redoStack.length > 0) {
                const nextState = cvs.redoStack.pop(); cvs.undoStack.push(nextState);
                const img = new Image(); img.onload = () => { cvs.ctx.clearRect(0, 0, cvs.canvas.width, cvs.canvas.height); cvs.ctx.drawImage(img, 0, 0); };
                img.src = nextState; updateBlockContent(cvs.roundId, cvs.blockId, nextState);
            }
        }
        window.clearWb = function(blockId) {
            if (confirm('白紙に戻しますか？')) {
                const cvs = canvases[blockId]; cvs.ctx.fillStyle = '#ffffff'; cvs.ctx.fillRect(0, 0, cvs.canvas.width, cvs.canvas.height);
                saveWbState(blockId); updateBlockContent(cvs.roundId, blockId, cvs.undoStack[cvs.undoStack.length - 1]);
            }
        }
        function updateWbUI(blockId) {
            const cvs = canvases[blockId]; if (!cvs) return;
            document.querySelectorAll(`.color-btn-${blockId}`).forEach(btn => { btn.classList.remove('active'); if (!cvs.isEraser && btn.dataset.color === cvs.color) btn.classList.add('active'); });
            const eraserBtn = document.getElementById(`eraser-${blockId}`); if (eraserBtn) { if (cvs.isEraser) eraserBtn.classList.add('active'); else eraserBtn.classList.remove('active'); }
        }

        function getBlockLabel(type) {
            if (type === 'text') return '📝 メモ';
            if (type === 'good') return '✅ Good';
            if (type === 'bad') return '❌ Next';
            if (type === 'image') return '📷 画像';
            if (type === 'whiteboard') return '🖌️ ホワイトボード';
            if (type === 'tier') return '🏆 Tierリスト';
            if (type === 'board') return '♟️ 盤面配置';
            if (type === 'flowchart') return '📊 フローチャート';
            return '';
        }

        function generateBlockHTML(block, roundId) {

            const fmt = block.format || { fontSize: 13, fontWeight: 'normal', color: '' };

            if (block.type === 'text' || block.type === 'good' || block.type === 'bad') {
                contentHTML = `<div class="rich-editor" data-block-id="${block.id}" contenteditable="true" placeholder="テキスト入力... (例: けいとりん、なみだなど と打つとアイコンになります)"
                    style="${editorStyle}"
                    oninput="handleRichTextInput(event, this, '${roundId}', '${blockId}')" onkeyup="handleRichTextInput(event, this, '${roundId}', '${blockId}')"
                    ondrop="setTimeout(()=>updateBlockContent('${roundId}', '${blockId}', this.innerHTML), 100)">${block.content || ''}</div>`;
            } else if (block.type === 'image') {

                    ? `<div class="image-preview"><img src="${block.content}" alt="Image"></div><div style="margin-top:10px;text-align:center;"><input type="file" accept="image/*" onchange="handleImageUpload(event, '${roundId}', '${blockId}')"></div>`
                    : `<div class="image-upload-area"><input type="file" accept="image/*" onchange="handleImageUpload(event, '${roundId}', '${blockId}')"><p style="margin-top:8px;">画像を選択してください</p></div>`;

                contentHTML = `<div class="wb-toolbar-wrapper">
                    <div class="wb-actions">

            } else if (block.type === 'tier') {

                            ${t.items.map((item, itemIdx) => {

                                return `<div class="tier-item" draggable="true" ondragstart="handleTierItemDragStart(event, '${roundId}', '${blockId}', '${t.id}', ${itemIdx})">
                                    <img src="${item.url}"><div class="tier-item-name">${item.name}</div>

                        </div>
                        <div class="tier-row-controls">

                    </div>`;
                });
                tierHtml += `<button class="tier-add-row" onclick="addTierRow('${roundId}', '${blockId}')">＋ 行を追加</button></div>`;

                                if (itemData && itemData.grantedTrait) unitTraits.add(itemData.grantedTrait);
